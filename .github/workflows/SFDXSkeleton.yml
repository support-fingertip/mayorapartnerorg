name: Create SFDC Project Skeleton

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name for the SFDC skeleton (new or existing)'
        required: true
        default: 'sfdc-project'
      project_name:
        description: 'Salesforce project name'
        required: true
        default: 'my-sfdc-project'
      api_version:
        description: 'Salesforce API version'
        required: true
        default: '59.0'
      namespace:
        description: 'Salesforce namespace (leave blank if none)'
        required: false
        default: ''
      login_url:
        description: 'Salesforce login URL'
        required: false
        default: 'https://login.salesforce.com'

jobs:
  create-skeleton:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ---------------------------------------------------------
      # 1️⃣ Checkout repository
      # ---------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 2️⃣ Configure Git
      # ---------------------------------------------------------
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ---------------------------------------------------------
      # 3️⃣ Checkout branch (existing or new)
      # ---------------------------------------------------------
      - name: Checkout branch
        run: |
          BRANCH="${{ github.event.inputs.branch_name }}"

          git fetch origin

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "✅ Branch '$BRANCH' exists. Checking out..."
            git checkout -b "$BRANCH" origin/"$BRANCH"
            git pull origin "$BRANCH"
          else
            echo "🌿 Branch '$BRANCH' does not exist. Creating new branch..."
            git checkout -b "$BRANCH"
          fi

          echo "📍 Current branch: $(git branch --show-current)"

      # ---------------------------------------------------------
      # 4️⃣ Create SFDC Project Structure
      # ---------------------------------------------------------
      - name: Create SFDC Skeleton
        run: |
          echo "📦 Creating Salesforce project skeleton..."

          # Source directories
          mkdir -p force-app/main/default/classes
          mkdir -p force-app/main/default/triggers
          mkdir -p force-app/main/default/lwc
          mkdir -p force-app/main/default/aura
          mkdir -p force-app/main/default/objects
          mkdir -p force-app/main/default/layouts
          mkdir -p force-app/main/default/flows
          mkdir -p force-app/main/default/permissionsets
          mkdir -p force-app/main/default/profiles
          mkdir -p force-app/main/default/staticresources
          mkdir -p force-app/main/default/tabs
          mkdir -p force-app/main/default/pages
          mkdir -p force-app/main/default/components
          mkdir -p force-app/main/default/email/unfiled\$public
          mkdir -p force-app/main/default/queues
          mkdir -p force-app/main/default/reports
          mkdir -p force-app/main/default/dashboards
          mkdir -p force-app/main/default/customMetadata
          mkdir -p force-app/main/default/contentassets

          # Support directories
          mkdir -p scripts/apex
          mkdir -p scripts/soql
          mkdir -p config
          mkdir -p .vscode
          mkdir -p .github/workflows

          echo "✅ Directory structure created"

      # ---------------------------------------------------------
      # 5️⃣ Create sfdx-project.json
      # ---------------------------------------------------------
      - name: Create sfdx-project.json
        run: |
          API_VERSION="${{ github.event.inputs.api_version }}"
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          NAMESPACE="${{ github.event.inputs.namespace }}"
          LOGIN_URL="${{ github.event.inputs.login_url }}"

          if [ ! -f "sfdx-project.json" ]; then
            cat > sfdx-project.json << EOF
          {
            "packageDirectories": [
              {
                "path": "force-app",
                "default": true
              }
            ],
            "name": "${PROJECT_NAME}",
            "namespace": "${NAMESPACE}",
            "sfdcLoginUrl": "${LOGIN_URL}",
            "sourceApiVersion": "${API_VERSION}",
            "plugins": {
              "sfdxDevhubUsername": ""
            }
          }
          EOF
            echo "✅ sfdx-project.json created"
          else
            echo "⏭️ sfdx-project.json already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 6️⃣ Create scratch org definition
      # ---------------------------------------------------------
      - name: Create scratch org definition
        run: |
          API_VERSION="${{ github.event.inputs.api_version }}"
          NAMESPACE="${{ github.event.inputs.namespace }}"

          if [ ! -f "config/project-scratch-def.json" ]; then
            cat > config/project-scratch-def.json << EOF
          {
            "orgName": "${{ github.event.inputs.project_name }}",
            "edition": "Developer",
            "namespace": "${NAMESPACE}",
            "features": [],
            "settings": {
              "apexSettings": {
                "enableAggregateCodeCoverageOnly": false
              },
              "lightningExperienceSettings": {
                "enableS1DesktopEnabled": true
              },
              "mobileSettings": {
                "enableS1EncryptedStoragePref2": false
              }
            }
          }
          EOF
            echo "✅ config/project-scratch-def.json created"
          else
            echo "⏭️ config/project-scratch-def.json already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 7️⃣ Create .forceignore
      # ---------------------------------------------------------
      - name: Create .forceignore
        run: |
          if [ ! -f ".forceignore" ]; then
            cat > .forceignore << 'EOF'
          # List files or directories below to ignore them when running
          # sf project deploy/retrieve commands

          package.xml

          # LWC configuration files
          **/jsconfig.json
          **/.eslintrc.json

          # LWC Jest
          **/__tests__/**

          # Admin Profile
          **/profiles/Admin.profile-meta.xml

          # Ignore specific metadata
          **/appMenus/**
          **/objectTranslations/**
          **/connectedApps/**

          # Node modules
          node_modules/
          EOF
            echo "✅ .forceignore created"
          else
            echo "⏭️ .forceignore already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 8️⃣ Create .gitignore
      # ---------------------------------------------------------
      - name: Create .gitignore for SFDC
        run: |
          if [ ! -f ".gitignore" ]; then
            cat > .gitignore << 'EOF'
          # Salesforce CLI
          .sf/
          .sfdx/
          .localdevserver/

          # LWC source maps
          **/lwc/**/*.css.map
          **/lwc/**/*.js.map

          # Logs
          *.log
          logs/

          # OS files
          .DS_Store
          Thumbs.db

          # IDE
          .idea/
          *.sublime-project
          *.sublime-workspace

          # Node
          node_modules/
          package-lock.json
          yarn.lock

          # Auth / secrets
          authfile.txt
          *.key
          *.crt
          server.key
          consumer.key

          # Deployment artifacts
          deployment-result.json
          changed-files.txt
          delta-package/
          destructiveChanges.xml
          EOF
            echo "✅ .gitignore created"
          else
            echo "⏭️ .gitignore already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 9️⃣ Create VS Code settings
      # ---------------------------------------------------------
      - name: Create VS Code settings
        run: |
          if [ ! -f ".vscode/settings.json" ]; then
            cat > .vscode/settings.json << 'EOF'
          {
            "editor.formatOnSave": true,
            "editor.tabSize": 4,
            "salesforcedx-vscode-apex.java.home": "",
            "search.exclude": {
              "**/node_modules": true,
              "**/bower_components": true,
              "**/.sfdx": true,
              "**/.sf": true
            },
            "files.exclude": {
              "**/.sfdx": true,
              "**/.sf": true
            },
            "eslint.enable": true,
            "eslint.nodePath": "./node_modules"
          }
          EOF
            echo "✅ VS Code settings.json created"
          else
            echo "⏭️ VS Code settings.json already exists, skipping..."
          fi

          if [ ! -f ".vscode/extensions.json" ]; then
            cat > .vscode/extensions.json << 'EOF'
          {
            "recommendations": [
              "salesforce.salesforcedx-vscode",
              "salesforce.salesforcedx-vscode-apex",
              "salesforce.salesforcedx-vscode-lwc",
              "salesforce.salesforcedx-vscode-soql",
              "redhat.vscode-xml",
              "dbaeumer.vscode-eslint",
              "esbenp.prettier-vscode"
            ]
          }
          EOF
            echo "✅ VS Code extensions.json created"
          else
            echo "⏭️ VS Code extensions.json already exists, skipping..."
          fi

          if [ ! -f ".vscode/launch.json" ]; then
            cat > .vscode/launch.json << 'EOF'
          {
            "version": "0.2.0",
            "configurations": [
              {
                "name": "Launch Apex Replay Debugger",
                "type": "apex-replay",
                "request": "launch",
                "logFile": "${command:AskForLogFileName}",
                "stopOnEntry": true,
                "trace": true
              }
            ]
          }
          EOF
            echo "✅ VS Code launch.json created"
          else
            echo "⏭️ VS Code launch.json already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 🔟 Create package.json (for LWC Jest + ESLint)
      # ---------------------------------------------------------
      - name: Create package.json and lint configs
        run: |
          if [ ! -f "package.json" ]; then
            cat > package.json << 'EOF'
          {
            "name": "salesforce-app",
            "private": true,
            "version": "1.0.0",
            "description": "Salesforce DX project",
            "scripts": {
              "lint": "eslint force-app/main/default/lwc",
              "test": "jest --coverage",
              "test:unit": "jest",
              "test:unit:watch": "jest --watch",
              "test:unit:debug": "jest --debug",
              "test:unit:coverage": "jest --coverage"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^1.7.0",
              "@salesforce/eslint-config-lwc": "^3.5.2",
              "@salesforce/eslint-plugin-lightning": "^1.0.0",
              "@salesforce/sfdx-lwc-jest": "^3.0.0",
              "eslint": "^8.0.0",
              "jest": "^29.0.0"
            }
          }
          EOF
            echo "✅ package.json created"
          else
            echo "⏭️ package.json already exists, skipping..."
          fi

          if [ ! -f ".eslintrc.json" ]; then
            cat > .eslintrc.json << 'EOF'
          {
            "extends": "@salesforce/eslint-config-lwc/recommended",
            "plugins": ["@salesforce/eslint-plugin-lightning"],
            "rules": {
              "no-console": "warn"
            }
          }
          EOF
            echo "✅ .eslintrc.json created"
          else
            echo "⏭️ .eslintrc.json already exists, skipping..."
          fi

          if [ ! -f "jest.config.js" ]; then
            cat > jest.config.js << 'EOF'
          const { jestConfig } = require('@salesforce/sfdx-lwc-jest/config.js');

          module.exports = {
            ...jestConfig,
            modulePathIgnorePatterns: ['<rootDir>/.localdevserver'],
            setupFiles: ['<rootDir>/jest.setup.js'],
          };
          EOF
            echo "✅ jest.config.js created"
          else
            echo "⏭️ jest.config.js already exists, skipping..."
          fi

          if [ ! -f "jest.setup.js" ]; then
            cat > jest.setup.js << 'EOF'
          // Jest setup file — add global mocks and test utilities here
          EOF
            echo "✅ jest.setup.js created"
          else
            echo "⏭️ jest.setup.js already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣1️⃣ Create sample Apex class
      # ---------------------------------------------------------
      - name: Create sample Apex class
        run: |
          API_VERSION="${{ github.event.inputs.api_version }}"

          if [ ! -f "force-app/main/default/classes/HelloWorld.cls" ]; then
            cat > force-app/main/default/classes/HelloWorld.cls << 'EOF'
          /**
           * @description Sample Apex class demonstrating basic patterns.
           * @author      GitHub Actions Skeleton Generator
           */
          public with sharing class HelloWorld {

              /**
               * @description Returns a greeting for the provided name.
               * @param  name The name to greet. If blank, returns a generic greeting.
               * @return      A greeting string.
               */
              public static String sayHello(String name) {
                  if (String.isBlank(name)) {
                      return 'Hello, World!';
                  }
                  return 'Hello, ' + name + '!';
              }
          }
          EOF

            cat > force-app/main/default/classes/HelloWorld.cls-meta.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <ApexClass xmlns="http://soap.sforce.com/2006/04/metadata">
              <apiVersion>${API_VERSION}</apiVersion>
              <status>Active</status>
          </ApexClass>
          EOF

            cat > force-app/main/default/classes/HelloWorldTest.cls << 'EOF'
          /**
           * @description Unit tests for HelloWorld.
           */
          @isTest
          private class HelloWorldTest {

              @isTest
              static void testSayHello_withName() {
                  System.assertEquals(
                      'Hello, Test!',
                      HelloWorld.sayHello('Test'),
                      'Expected personalised greeting'
                  );
              }

              @isTest
              static void testSayHello_withNull() {
                  System.assertEquals(
                      'Hello, World!',
                      HelloWorld.sayHello(null),
                      'Expected generic greeting for null'
                  );
              }

              @isTest
              static void testSayHello_withBlank() {
                  System.assertEquals(
                      'Hello, World!',
                      HelloWorld.sayHello('   '),
                      'Expected generic greeting for blank string'
                  );
              }
          }
          EOF

            cat > force-app/main/default/classes/HelloWorldTest.cls-meta.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <ApexClass xmlns="http://soap.sforce.com/2006/04/metadata">
              <apiVersion>${API_VERSION}</apiVersion>
              <status>Active</status>
          </ApexClass>
          EOF

            echo "✅ Sample Apex classes created"
          else
            echo "⏭️ HelloWorld.cls already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣2️⃣ Create sample LWC with Jest test
      # ---------------------------------------------------------
      - name: Create sample LWC
        run: |
          API_VERSION="${{ github.event.inputs.api_version }}"

          if [ ! -d "force-app/main/default/lwc/helloWorld" ]; then
            mkdir -p force-app/main/default/lwc/helloWorld/__tests__

            cat > force-app/main/default/lwc/helloWorld/helloWorld.html << 'EOF'
          <template>
              <lightning-card title="Hello World" icon-name="custom:custom14">
                  <div class="slds-p-horizontal_small">
                      <lightning-input
                          label="Enter your name"
                          value={name}
                          onchange={handleNameChange}>
                      </lightning-input>
                      <p class="slds-p-top_medium">
                          <strong>{greeting}</strong>
                      </p>
                  </div>
              </lightning-card>
          </template>
          EOF

            cat > force-app/main/default/lwc/helloWorld/helloWorld.js << 'EOF'
          import { LightningElement, track } from 'lwc';

          export default class HelloWorld extends LightningElement {
              @track name = '';

              get greeting() {
                  return this.name ? `Hello, ${this.name}!` : 'Hello, World!';
              }

              handleNameChange(event) {
                  this.name = event.target.value;
              }
          }
          EOF

            cat > force-app/main/default/lwc/helloWorld/helloWorld.css << 'EOF'
          :host {
              display: block;
          }
          EOF

            cat > force-app/main/default/lwc/helloWorld/helloWorld.js-meta.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <LightningComponentBundle xmlns="http://soap.sforce.com/2006/04/metadata">
              <apiVersion>${API_VERSION}</apiVersion>
              <isExposed>true</isExposed>
              <targets>
                  <target>lightning__AppPage</target>
                  <target>lightning__RecordPage</target>
                  <target>lightning__HomePage</target>
              </targets>
          </LightningComponentBundle>
          EOF

            cat > force-app/main/default/lwc/helloWorld/__tests__/helloWorld.test.js << 'EOF'
          import { createElement } from 'lwc';
          import HelloWorld from 'c/helloWorld';

          describe('c-hello-world', () => {
              afterEach(() => {
                  while (document.body.firstChild) {
                      document.body.removeChild(document.body.firstChild);
                  }
              });

              it('displays default greeting when no name is entered', () => {
                  const element = createElement('c-hello-world', { is: HelloWorld });
                  document.body.appendChild(element);

                  const p = element.shadowRoot.querySelector('p');
                  expect(p.textContent).toBe('Hello, World!');
              });

              it('displays personalised greeting when name is entered', async () => {
                  const element = createElement('c-hello-world', { is: HelloWorld });
                  document.body.appendChild(element);

                  const input = element.shadowRoot.querySelector('lightning-input');
                  input.value = 'Salesforce';
                  input.dispatchEvent(new CustomEvent('change'));

                  await Promise.resolve();

                  const p = element.shadowRoot.querySelector('p');
                  expect(p.textContent).toBe('Hello, Salesforce!');
              });
          });
          EOF

            echo "✅ Sample LWC created (with Jest test)"
          else
            echo "⏭️ helloWorld LWC already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣3️⃣ Create anonymous Apex scripts
      # ---------------------------------------------------------
      - name: Create anonymous Apex scripts
        run: |
          if [ ! -f "scripts/apex/hello.apex" ]; then
            cat > scripts/apex/hello.apex << 'EOF'
          // Anonymous Apex — run with:
          //   sf apex run --file scripts/apex/hello.apex --target-org <alias>
          System.debug(HelloWorld.sayHello('World'));
          EOF
            echo "✅ scripts/apex/hello.apex created"
          else
            echo "⏭️ scripts/apex/hello.apex already exists, skipping..."
          fi

          if [ ! -f "scripts/soql/sample.soql" ]; then
            cat > scripts/soql/sample.soql << 'EOF'
          -- Sample SOQL — run with:
          --   sf data query --query "SELECT Id, Name FROM Account LIMIT 10" --target-org <alias>
          SELECT Id, Name, CreatedDate
          FROM Account
          ORDER BY CreatedDate DESC
          LIMIT 10
          EOF
            echo "✅ scripts/soql/sample.soql created"
          else
            echo "⏭️ scripts/soql/sample.soql already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣4️⃣ Create package.xml manifest
      # ---------------------------------------------------------
      - name: Create package.xml manifest
        run: |
          API_VERSION="${{ github.event.inputs.api_version }}"

          mkdir -p manifest

          if [ ! -f "manifest/package.xml" ]; then
            cat > manifest/package.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Package xmlns="http://soap.sforce.com/2006/04/metadata">
              <types>
                  <members>*</members>
                  <name>ApexClass</name>
              </types>
              <types>
                  <members>*</members>
                  <name>ApexTrigger</name>
              </types>
              <types>
                  <members>*</members>
                  <name>LightningComponentBundle</name>
              </types>
              <types>
                  <members>*</members>
                  <name>AuraDefinitionBundle</name>
              </types>
              <types>
                  <members>*</members>
                  <name>CustomObject</name>
              </types>
              <types>
                  <members>*</members>
                  <name>CustomField</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Layout</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Flow</name>
              </types>
              <types>
                  <members>*</members>
                  <name>PermissionSet</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Profile</name>
              </types>
              <types>
                  <members>*</members>
                  <name>StaticResource</name>
              </types>
              <types>
                  <members>*</members>
                  <name>CustomTab</name>
              </types>
              <types>
                  <members>*</members>
                  <name>ApexPage</name>
              </types>
              <types>
                  <members>*</members>
                  <name>ApexComponent</name>
              </types>
              <types>
                  <members>*</members>
                  <name>EmailTemplate</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Queue</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Report</name>
              </types>
              <types>
                  <members>*</members>
                  <name>Dashboard</name>
              </types>
              <types>
                  <members>*</members>
                  <name>ValidationRule</name>
              </types>
              <types>
                  <members>*</members>
                  <name>WorkflowRule</name>
              </types>
              <types>
                  <members>*</members>
                  <name>CustomMetadata</name>
              </types>
              <types>
                  <members>*</members>
                  <name>ContentAsset</name>
              </types>
              <version>${API_VERSION}</version>
          </Package>
          EOF
            echo "✅ manifest/package.xml created"
          else
            echo "⏭️ manifest/package.xml already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣5️⃣ Create README
      # ---------------------------------------------------------
      - name: Create README
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          API_VERSION="${{ github.event.inputs.api_version }}"
          LOGIN_URL="${{ github.event.inputs.login_url }}"

          if [ ! -f "README.md" ]; then
            cat > README.md << EOF
          # ${PROJECT_NAME}

          Salesforce DX Project — API Version ${API_VERSION}

          ## 🚀 Getting Started

          ### Prerequisites
          - [Salesforce CLI (sf)](https://developer.salesforce.com/tools/salesforcecli) v2+
          - Java 11+ (required for Apex language server)
          - Node.js 18+ (required for LWC Jest tests)

          ### 1. Authorize your org

          \`\`\`bash
          # Production / Developer org
          sf org login web --alias myorg --instance-url ${LOGIN_URL} --set-default

          # Scratch org (requires Dev Hub)
          sf org login web --alias devhub --set-default-dev-hub
          sf org create scratch --definition-file config/project-scratch-def.json --alias scratch --set-default --duration-days 30
          \`\`\`

          ### 2. Deploy to your org

          \`\`\`bash
          # Deploy all source
          sf project deploy start --source-dir force-app --target-org myorg

          # Deploy via manifest
          sf project deploy start --manifest manifest/package.xml --target-org myorg
          \`\`\`

          ### 3. Run Apex tests

          \`\`\`bash
          sf apex run test --target-org myorg --test-level RunLocalTests --result-format human
          \`\`\`

          ### 4. Run LWC Jest tests

          \`\`\`bash
          npm install
          npm test
          \`\`\`

          ### 5. Run anonymous Apex

          \`\`\`bash
          sf apex run --file scripts/apex/hello.apex --target-org myorg
          \`\`\`

          ### 6. Retrieve metadata

          \`\`\`bash
          sf project retrieve start --manifest manifest/package.xml --target-org myorg
          \`\`\`

          ## 📁 Project Structure

          \`\`\`
          .
          ├── config/
          │   └── project-scratch-def.json   # Scratch org definition
          ├── force-app/
          │   └── main/default/
          │       ├── classes/               # Apex classes
          │       ├── triggers/              # Apex triggers
          │       ├── lwc/                   # Lightning Web Components
          │       ├── aura/                  # Aura components
          │       ├── flows/                 # Flows / Process Builder
          │       ├── objects/               # Custom objects & fields
          │       ├── layouts/               # Page layouts
          │       ├── permissionsets/        # Permission sets
          │       ├── profiles/              # Profiles
          │       ├── staticresources/       # Static resources
          │       ├── customMetadata/        # Custom metadata types
          │       └── contentassets/         # Content assets
          ├── manifest/
          │   └── package.xml                # Metadata manifest
          ├── scripts/
          │   ├── apex/                      # Anonymous Apex scripts
          │   └── soql/                      # SOQL query files
          ├── .vscode/                       # VS Code settings
          ├── .forceignore                   # Salesforce CLI ignore rules
          ├── jest.config.js                 # LWC Jest configuration
          ├── package.json                   # Node dependencies (Jest + ESLint)
          └── sfdx-project.json              # SFDX project configuration
          \`\`\`

          ## 🛠️ Useful Commands

          | Task | Command |
          |------|---------|
          | Open org in browser | \`sf org open --target-org myorg\` |
          | List orgs | \`sf org list\` |
          | Run SOQL query | \`sf data query --query "SELECT Id FROM Account" --target-org myorg\` |
          | Lint LWC | \`npm run lint\` |
          | Generate Apex log | \`sf apex tail log --target-org myorg\` |

          ---
          *Generated by GitHub Actions on $(date -u '+%Y-%m-%d')*
          EOF
            echo "✅ README.md created"
          else
            echo "⏭️ README.md already exists, skipping..."
          fi

      # ---------------------------------------------------------
      # 1️⃣6️⃣ Create placeholder .gitkeep files
      # ---------------------------------------------------------
      - name: Create placeholder files
        run: |
          touch force-app/main/default/triggers/.gitkeep
          touch force-app/main/default/aura/.gitkeep
          touch force-app/main/default/objects/.gitkeep
          touch force-app/main/default/layouts/.gitkeep
          touch force-app/main/default/flows/.gitkeep
          touch force-app/main/default/permissionsets/.gitkeep
          touch force-app/main/default/profiles/.gitkeep
          touch force-app/main/default/staticresources/.gitkeep
          touch force-app/main/default/tabs/.gitkeep
          touch force-app/main/default/pages/.gitkeep
          touch force-app/main/default/components/.gitkeep
          touch force-app/main/default/customMetadata/.gitkeep
          touch force-app/main/default/contentassets/.gitkeep
          touch "force-app/main/default/email/unfiled\$public/.gitkeep"
          touch scripts/soql/.gitkeep

          echo "✅ Placeholder files created"

      # ---------------------------------------------------------
      # 1️⃣7️⃣ Commit and Push
      # ---------------------------------------------------------
      - name: Commit and Push
        run: |
          BRANCH="${{ github.event.inputs.branch_name }}"
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          API_VERSION="${{ github.event.inputs.api_version }}"

          # Stage all new/changed files
          git add .

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit. Skeleton may already exist."
          else
            git commit -m "chore: create SFDC project skeleton for ${PROJECT_NAME}

          Scaffolded a full Salesforce DX project structure:

          Project settings
          - API version: ${API_VERSION}
          - Login URL: ${{ github.event.inputs.login_url }}
          - Namespace: '${{ github.event.inputs.namespace }}'

          Files created
          - sfdx-project.json
          - config/project-scratch-def.json
          - manifest/package.xml
          - .forceignore / .gitignore
          - .vscode/settings.json, extensions.json, launch.json
          - package.json, jest.config.js, .eslintrc.json (LWC tooling)
          - force-app/ directory tree with .gitkeep placeholders
          - Sample Apex class + 3 unit tests (HelloWorld)
          - Sample LWC + Jest test (helloWorld)
          - scripts/apex/hello.apex, scripts/soql/sample.soql
          - README.md

          Generated by GitHub Actions"

            git push origin "$BRANCH"

            echo ""
            echo "════════════════════════════════════════════"
            echo "✅  SFDC Skeleton Created Successfully!"
            echo "════════════════════════════════════════════"
            echo "🌿 Branch      : $BRANCH"
            echo "📦 Project     : $PROJECT_NAME"
            echo "🔢 API Version : $API_VERSION"
            echo "════════════════════════════════════════════"
          fi

      # ---------------------------------------------------------
      # 1️⃣8️⃣ Write GitHub Job Summary
      # ---------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          BRANCH="${{ github.event.inputs.branch_name }}"
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          API_VERSION="${{ github.event.inputs.api_version }}"
          REPO="${{ github.repository }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ SFDC Project Skeleton

          | Field | Value |
          |-------|-------|
          | **Project** | \`${PROJECT_NAME}\` |
          | **Branch** | [\`${BRANCH}\`](https://github.com/${REPO}/tree/${BRANCH}) |
          | **API Version** | \`${API_VERSION}\` |
          | **Login URL** | \`${{ github.event.inputs.login_url }}\` |
          | **Namespace** | \`${{ github.event.inputs.namespace || '(none)' }}\` |

          ### 📁 What was created

          | Path | Description |
          |------|-------------|
          | \`sfdx-project.json\` | SFDX project config |
          | \`config/project-scratch-def.json\` | Scratch org definition |
          | \`manifest/package.xml\` | Full metadata manifest |
          | \`force-app/main/default/classes/\` | HelloWorld.cls + test |
          | \`force-app/main/default/lwc/helloWorld/\` | LWC + Jest test |
          | \`scripts/apex/hello.apex\` | Anonymous Apex script |
          | \`scripts/soql/sample.soql\` | Sample SOQL query |
          | \`package.json\` | Jest + ESLint dependencies |
          | \`jest.config.js\` | LWC Jest configuration |
          | \`.eslintrc.json\` | ESLint rules for LWC |
          | \`.vscode/\` | VS Code settings, extensions, debugger |
          | \`README.md\` | Getting-started guide |

          ### 🚀 Next steps
          \`\`\`bash
          git checkout ${BRANCH}
          sf org login web --alias myorg --set-default
          sf project deploy start --source-dir force-app --target-org myorg
          \`\`\`
          EOF
