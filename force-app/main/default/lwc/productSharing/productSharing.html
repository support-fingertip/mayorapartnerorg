<template>
    <div class="dms-sharing">
        <div class="dms-body">
            <div class="dms-kpis">
                <template for:each={kpis} for:item="kpi">
                    <c-dms-kpi-card key={kpi.id} label={kpi.label} value={kpi.value} variant={kpi.variant}></c-dms-kpi-card>
                </template>
            </div>

            <div class="dms-note">
                <strong>Product visibility (BRD §9.3):</strong> Admin assigns each SKU's visibility — Nation, Branch, State,
                Channel (GT / MT / Both) or Distributor-specific. When an order is taken, the most specific matching rule
                decides whether the SKU is offered.
            </div>

            <div class="dms-filters">
                <div class="dms-filter">
                    <span class="dms-filter__label">Level:</span>
                    <lightning-combobox variant="label-hidden" value={level} options={levelOptions} onchange={handleLevel}></lightning-combobox>
                </div>
                <div class="dms-filter">
                    <span class="dms-filter__label">Channel:</span>
                    <lightning-combobox variant="label-hidden" value={channel} options={channelOptions} onchange={handleChannel}></lightning-combobox>
                </div>
                <div class="dms-filter dms-filter_search">
                    <lightning-input type="search" variant="label-hidden" placeholder="Search SKU or scope..." value={searchKey} onchange={handleSearch}></lightning-input>
                </div>
            </div>

            <div class="dms-tbl dms-tbl_sharing">
                <div class="dms-thead">
                    <span>SKU Code</span><span>Product</span><span>Visibility Level</span>
                    <span>Scope</span><span>Channel</span><span>Status</span>
                </div>
                <template for:each={filteredRules} for:item="r">
                    <div key={r.key} class="dms-trow">
                        <span class="dms-code" data-label="SKU Code">{r.sku}</span>
                        <span class="dms-strong" data-label="Product">{r.skuName}</span>
                        <span data-label="Visibility Level">
                            <c-dms-status-badge label={r.level} theme={r.levelTheme}></c-dms-status-badge>
                        </span>
                        <span data-label="Scope">{r.scope}</span>
                        <span data-label="Channel">{r.channel}</span>
                        <span data-label="Status">
                            <c-dms-status-badge label={r.status} theme={r.statusTheme}></c-dms-status-badge>
                        </span>
                    </div>
                </template>
            </div>
            <p class="dms-count">{ruleCountLabel}</p>
        </div>
    </div>
</template>
