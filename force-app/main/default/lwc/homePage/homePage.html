<template>
    <!-- ═══════════════════════════════════════════════
         LOADING STATE
         ═══════════════════════════════════════════════ -->
    <template if:true={isLoading}>
        <div class="hp-loading">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            <p class="hp-loading-text">Loading Home Page...</p>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════════
         MAIN CONTENT
         ═══════════════════════════════════════════════ -->
    <template if:false={isLoading}>
        <!-- HEADER -->
        <div class="hp-header">
            <div class="hp-header-left">
                <lightning-icon icon-name="standard:home" size="small"></lightning-icon>
                <div class="hp-header-text">
                    <h1 class="hp-header-title">FMCG Workspace</h1>
                    <span class="hp-header-date">{currentTime}</span>
                </div>
            </div>
            <div class="hp-header-right">
                <button class="hp-refresh-btn" onclick={handleRefresh} title="Refresh">
                    <lightning-icon icon-name="utility:refresh" size="xx-small" variant="inverse"></lightning-icon>
                </button>
            </div>
        </div>

        <!-- TAB NAVIGATION -->
        <nav class="hp-tab-bar">
            <template for:each={tabItems} for:item="tab">
                <button key={tab.key}
                        class={tab.cssClass}
                        data-tab={tab.key}
                        onclick={handleTabClick}>
                    <lightning-icon icon-name={tab.icon} size="xx-small"></lightning-icon>
                    <span class="hp-tab-label">{tab.label}</span>
                </button>
            </template>
        </nav>

        <!-- TAB CONTENT AREA -->
        <div class="hp-content">

            <!-- ═══════ DASHBOARD TAB ═══════ -->
            <template if:true={isDashboard}>
                <div class="hp-section">
                    <h2 class="hp-section-title">Today's Overview</h2>

                    <!-- Summary Cards Row -->
                    <div class="hp-stat-grid">
                        <!-- Attendance Card -->
                        <div class="hp-stat-card hp-card-blue" data-target="Visit_Manager" onclick={navigateTo}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:log_a_call" size="small"></lightning-icon>
                                <span class={attendanceBadgeClass}>{data.attendanceStatus}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Day Status</span>
                            </div>
                        </div>

                        <!-- Visit Progress Card -->
                        <div class="hp-stat-card hp-card-green" data-target="Visit_Manager" onclick={navigateTo}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:address" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.completedVisitCount}/{data.todayVisitCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Visits Completed</span>
                                <div class="hp-progress-bar">
                                    <div class="hp-progress-fill hp-fill-green" style={visitProgressStyle}></div>
                                </div>
                            </div>
                        </div>

                        <!-- Pending Orders -->
                        <div class="hp-stat-card hp-card-orange" data-object="Sales_Order__c" onclick={navigateToObject}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:orders" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.pendingOrderCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Pending Orders</span>
                            </div>
                        </div>

                        <!-- Pending Collections -->
                        <div class="hp-stat-card hp-card-purple" data-object="Collection__c" onclick={navigateToObject}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:currency" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.pendingCollectionCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Pending Collections</span>
                            </div>
                        </div>

                        <!-- Open Tickets -->
                        <div class="hp-stat-card hp-card-red" data-object="Ticket__c" onclick={navigateToObject}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:case" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.openTicketCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Open Tickets</span>
                            </div>
                        </div>

                        <!-- Active Schemes -->
                        <div class="hp-stat-card hp-card-teal" data-target="Scheme_Manager" onclick={navigateTo}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:reward" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.activeSchemeCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Active Schemes</span>
                            </div>
                        </div>

                        <!-- Pending Returns -->
                        <div class="hp-stat-card hp-card-orange" data-object="Return_Order__c" onclick={navigateToObject}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="standard:return_order" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.pendingReturnCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Pending Returns</span>
                            </div>
                        </div>

                        <!-- Low Stock Alerts -->
                        <div class="hp-stat-card hp-card-red" data-target="Stock_Dashboard" onclick={navigateTo}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.lowStockAlertCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Low Stock Alerts</span>
                            </div>
                        </div>

                        <!-- Near Expiry Batches -->
                        <div class="hp-stat-card hp-card-orange" data-target="Product_Management_Hub" onclick={navigateTo}>
                            <div class="hp-stat-header">
                                <lightning-icon icon-name="utility:clock" size="small"></lightning-icon>
                                <span class="hp-stat-number">{data.nearExpiryBatchCount}</span>
                            </div>
                            <div class="hp-stat-body">
                                <span class="hp-stat-label">Near Expiry Batches</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="hp-section">
                    <h2 class="hp-section-title">Quick Actions</h2>
                    <div class="hp-quick-grid">
                        <div class="hp-quick-card" data-target="Visit_Manager" onclick={navigateTo}>
                            <div class="hp-quick-icon hp-icon-blue">
                                <lightning-icon icon-name="utility:checkin" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">Start Day</span>
                        </div>
                        <div class="hp-quick-card" data-target="Visit_Manager" onclick={navigateTo}>
                            <div class="hp-quick-icon hp-icon-green">
                                <lightning-icon icon-name="utility:location" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">Visit Board</span>
                        </div>
                        <div class="hp-quick-card" data-target="Beat_Manager" onclick={navigateTo}>
                            <div class="hp-quick-icon hp-icon-orange">
                                <lightning-icon icon-name="utility:routing_offline" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">Beat Plan</span>
                        </div>
                        <div class="hp-quick-card" data-object="Sales_Order__c" onclick={navigateToObject}>
                            <div class="hp-quick-icon hp-icon-purple">
                                <lightning-icon icon-name="utility:cart" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">New Order</span>
                        </div>
                        <div class="hp-quick-card" data-object="Collection__c" onclick={navigateToObject}>
                            <div class="hp-quick-icon hp-icon-teal">
                                <lightning-icon icon-name="utility:money" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">Collections</span>
                        </div>
                        <div class="hp-quick-card" data-target="Product_Catalog" onclick={navigateTo}>
                            <div class="hp-quick-icon hp-icon-red">
                                <lightning-icon icon-name="utility:product_consumed" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">Catalog</span>
                        </div>
                        <div class="hp-quick-card" data-target="Dynamic_KPI_Dashboard" onclick={navigateTo}>
                            <div class="hp-quick-icon hp-icon-blue">
                                <lightning-icon icon-name="utility:chart" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <span class="hp-quick-label">KPI Dashboard</span>
                        </div>
                    </div>
                </div>

                <!-- Analytics & Insights -->
                <div class="hp-section">
                    <h2 class="hp-section-title">Analytics & Insights</h2>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-target="Dynamic_KPI_Dashboard" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-blue">
                                <lightning-icon icon-name="standard:dashboard" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Dynamic KPI Dashboard</h3>
                                <p class="hp-nav-desc">Pick any metric, filter by any dimension, analyse trends and forecasts</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Achievement_Dashboard" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-teal">
                                <lightning-icon icon-name="standard:performance" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Achievement Dashboard</h3>
                                <p class="hp-nav-desc">Individual KPIs, monthly trends, and leaderboard</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="KPI_Metric_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="custom:custom25" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">KPI Metric Manager</h3>
                                <p class="hp-nav-desc">Define and manage KPI metrics with smart field pickers</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ═══════ FIELD OPS TAB ═══════ -->
            <template if:true={isFieldOps}>
                <div class="hp-section">
                    <h2 class="hp-section-title">Setup: Territory &amp; Beats</h2>
                    <p class="hp-section-hint">Configure these first — beats and journey plans depend on territories and outlets.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-target="Beat_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:shift" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Beat Manager</h3>
                                <p class="hp-nav-desc">Create and manage beats, assign outlets to beats</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Beat_Calendar" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-green">
                                <lightning-icon icon-name="standard:event" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Beat Plan Calendar</h3>
                                <p class="hp-nav-desc">Weekly and monthly beat planning calendar view</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Journey_Plan__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-blue">
                                <lightning-icon icon-name="standard:travel_mode" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Journey Plans</h3>
                                <p class="hp-nav-desc">View and manage journey plan assignments</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>

                <div class="hp-section">
                    <h2 class="hp-section-title">Daily Operations</h2>
                    <p class="hp-section-hint">Day-to-day visit execution, tracking and team monitoring.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-target="Visit_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-blue">
                                <lightning-icon icon-name="standard:address" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Visit Manager</h3>
                                <p class="hp-nav-desc">Day start/end, visit check-in/out, and activity tracking</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Team_Visit_Dashboard" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-purple">
                                <lightning-icon icon-name="standard:dashboard" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Team Visit Dashboard</h3>
                                <p class="hp-nav-desc">Monitor team visit performance and coverage</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Visit__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-teal">
                                <lightning-icon icon-name="standard:record" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Visit Records</h3>
                                <p class="hp-nav-desc">Browse and search all visit records</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ═══════ SALES TAB ═══════ -->
            <template if:true={isSales}>
                <div class="hp-section">
                    <h2 class="hp-section-title">Setup: Accounts &amp; Schemes</h2>
                    <p class="hp-section-hint">Set up customers and schemes first — orders, collections and targets depend on these.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-object="Account" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-teal">
                                <lightning-icon icon-name="standard:account" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Accounts / Outlets</h3>
                                <p class="hp-nav-desc">Customer accounts and outlet management</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Scheme_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-purple">
                                <lightning-icon icon-name="standard:reward" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Scheme Manager</h3>
                                <p class="hp-nav-desc">Trade schemes, discounts, and promotions</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Competitor__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:swarm_session" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Competitors</h3>
                                <p class="hp-nav-desc">Competitor tracking and intelligence</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>

                <div class="hp-section">
                    <h2 class="hp-section-title">Order Management</h2>
                    <p class="hp-section-hint">Day-to-day sales transactions — orders, collections, returns, invoices.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-object="Sales_Order__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-blue">
                                <lightning-icon icon-name="standard:orders" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Sales Orders</h3>
                                <p class="hp-nav-desc">View and manage sales orders</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Collection__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-green">
                                <lightning-icon icon-name="standard:currency" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Collections</h3>
                                <p class="hp-nav-desc">Payment collection tracking and management</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Invoice__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:contract" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Invoices</h3>
                                <p class="hp-nav-desc">View invoices and billing records</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-object="Return_Order__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-red">
                                <lightning-icon icon-name="standard:return_order" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Return Orders</h3>
                                <p class="hp-nav-desc">Process and track product returns</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>

                <div class="hp-section">
                    <h2 class="hp-section-title">Targets &amp; Incentives</h2>
                    <p class="hp-section-hint">Configure in order: Periods &rarr; Criteria &rarr; Allocation &rarr; Incentive Slabs.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-object="Target_Period__c" onclick={navigateToObject}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:date_input" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Target Periods</h3>
                                <p class="hp-nav-desc">Monthly, quarterly, and yearly target periods</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Target_Criteria_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-blue">
                                <lightning-icon icon-name="standard:filter" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Target Criteria Manager</h3>
                                <p class="hp-nav-desc">Create, edit, and manage dynamic target criteria</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Target_Allocation" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-green">
                                <lightning-icon icon-name="standard:goals" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Target Allocation</h3>
                                <p class="hp-nav-desc">Allocate, distribute, and track target achievements</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Incentive_Slab_Manager" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:slider" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Incentive Slab Manager</h3>
                                <p class="hp-nav-desc">Configure incentive payout tiers and multipliers</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Incentive_Dashboard" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-purple">
                                <lightning-icon icon-name="standard:reward" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Incentive Dashboard</h3>
                                <p class="hp-nav-desc">Calculate, approve, and track incentive payouts</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ═══════ INVENTORY TAB ═══════ -->
            <template if:true={isInventory}>
                <div class="hp-section">
                    <h2 class="hp-section-title">Setup: Products &amp; Warehouses</h2>
                    <p class="hp-section-hint">Set up products, UOM, pricing and warehouses first — stock and orders depend on these.</p>
                    <div class="hp-nav-grid">
                        <div class="hp-nav-card" data-target="Product_Management_Hub" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-orange">
                                <lightning-icon icon-name="standard:product_workspace" size="medium"></lightning-icon>
                            </div>
                            <div class="hp-nav-info">
                                <h3 class="hp-nav-title">Product Management Hub</h3>
                                <p class="hp-nav-desc">Products, pricing, categories, UOM, and conversions</p>
                            </div>
                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="hp-nav-arrow"></lightning-icon>
                        </div>

                        <div class="hp-nav-card" data-target="Product_Management_Hub" onclick={navigateTo}>
                            <div class="hp-nav-icon hp-icon-red">
