<template>
    <div class="dms-schemes-mgmt">
        <!-- Sub-tabs -->
        <div class="dms-subtabs" role="tablist">
            <button class={schemesTabClass} data-tab="schemes" onclick={handleTab} type="button">
                <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                </svg>
                Schemes
            </button>
            <button class={claimsTabClass} data-tab="claims" onclick={handleTab} type="button">
                <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                Scheme Claims
            </button>
        </div>

        <div class="dms-body">
            <!-- ========================== Schemes ======================== -->
            <template lwc:if={isSchemes}>
                <div class="dms-kpis">
                    <template for:each={kpis} for:item="kpi">
                        <c-dms-kpi-card key={kpi.id} label={kpi.label} value={kpi.value} variant={kpi.variant}></c-dms-kpi-card>
                    </template>
                </div>

                <div class="dms-note">
                    <strong>Header + Children:</strong> each scheme is one Header joined to its lists — Slabs, Eligibility,
                    Bundle Lines and Tiers. Approval flow: <em>IT Admin review → Sales Director</em>. Select a row to inspect
                    its configuration.
                </div>

                <div class="dms-filters">
                    <div class="dms-filter">
                        <span class="dms-filter__label">Type:</span>
                        <lightning-combobox variant="label-hidden" value={type} options={typeOptions} onchange={handleType}></lightning-combobox>
                    </div>
                    <div class="dms-filter">
                        <span class="dms-filter__label">Status:</span>
                        <lightning-combobox variant="label-hidden" value={status} options={statusOptions} onchange={handleStatus}></lightning-combobox>
                    </div>
                    <div class="dms-filter dms-filter_search">
                        <lightning-input type="search" variant="label-hidden" placeholder="Search scheme or ID..." value={searchKey} onchange={handleSearch}></lightning-input>
                    </div>
                </div>

                <div class="dms-tbl dms-tbl_schemes">
                    <div class="dms-thead">
                        <span>Scheme</span><span>Class</span><span>Type</span>
                        <span>Evaluation</span><span>Benefit</span><span>Budget Utilized</span><span>Status</span>
                    </div>
                    <template for:each={filteredSchemes} for:item="s">
                        <div key={s.key} class={s.rowClass} data-id={s.id} onclick={handleSelect}>
                            <span class="dms-scheme-cell" data-label="Scheme">
                                <span class="dms-strong">{s.name}</span>
                                <span class="dms-code">{s.id} · {s.passLabel}</span>
                            </span>
                            <span data-label="Class">{s.schemeClass}</span>
                            <span data-label="Type">{s.type}</span>
                            <span class="dms-muted" data-label="Evaluation">{s.basis}</span>
                            <span data-label="Benefit">{s.benefit}</span>
                            <span class="dms-coverage" data-label="Budget Utilized">
                                <span class="dms-coverage__track">
                                    <span class="dms-coverage__bar" style={s.barStyle}></span>
                                </span>
                                <span class="dms-coverage__pct">{s.utilLabel}</span>
                            </span>
                            <span data-label="Status">
                                <c-dms-status-badge label={s.status} theme={s.statusTheme}></c-dms-status-badge>
                            </span>
                        </div>
                    </template>
                </div>
                <p class="dms-count">{schemeCountLabel}</p>

                <!-- Detail (Header + Children) -->
                <template lwc:if={selected}>
                    <section class="dms-detail">
                        <div class="dms-detail__head">
                            <h2 class="dms-detail__title">{selected.name}</h2>
                            <button class="dms-detail__close" onclick={handleCloseDetail} type="button">✕</button>
                        </div>

                        <div class="dms-detail__grid">
                            <div><span class="dms-detail__k">Scheme ID</span><span class="dms-detail__v">{selected.id}</span></div>
                            <div><span class="dms-detail__k">Class</span><span class="dms-detail__v">{selected.schemeClass}</span></div>
                            <div><span class="dms-detail__k">Type</span><span class="dms-detail__v">{selected.type}</span></div>
                            <div><span class="dms-detail__k">Evaluation Basis</span><span class="dms-detail__v">{selected.basis}</span></div>
                            <div><span class="dms-detail__k">Benefit</span><span class="dms-detail__v">{selected.benefit}</span></div>
                            <div><span class="dms-detail__k">Pass-Through</span><span class="dms-detail__v">{selected.passLabel}</span></div>
                            <div><span class="dms-detail__k">Claimable</span><span class="dms-detail__v">{selected.claimableLabel}</span></div>
                            <div><span class="dms-detail__k">Validity</span><span class="dms-detail__v">{selected.start} – {selected.end}</span></div>
                            <div><span class="dms-detail__k">Budget</span><span class="dms-detail__v">{selected.budgetLabel}</span></div>
                            <div><span class="dms-detail__k">Utilized</span><span class="dms-detail__v">{selected.utilizedLabel}</span></div>
                        </div>

                        <!-- Slabs -->
                        <template lwc:if={selected.hasSlabs}>
                            <h3 class="dms-detail__sub">Slabs (buy-and-get steps)</h3>
                            <div class="dms-tbl dms-tbl_child">
                                <div class="dms-thead"><span>Buy Qty / Value</span><span>Get Qty</span><span>Note</span></div>
                                <template for:each={selected.slabRows} for:item="r">
                                    <div key={r.key} class="dms-trow">
                                        <span class="dms-strong" data-label="Buy Qty / Value">{r.buy}</span>
                                        <span data-label="Get Qty">{r.get}</span>
                                        <span class="dms-muted" data-label="Note">{r.note}</span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Tiers (pass-through) -->
                        <template lwc:if={selected.hasTiers}>
                            <h3 class="dms-detail__sub">Tiers (pass-through P1 → P2 → P3)</h3>
                            <div class="dms-tbl dms-tbl_child">
                                <div class="dms-thead"><span>Tier</span><span>Buy Qty</span><span>Get Qty</span><span>Note</span></div>
                                <template for:each={selected.tierRows} for:item="r">
                                    <div key={r.key} class="dms-trow dms-trow_4">
                                        <span class="dms-strong" data-label="Tier">{r.tier}</span>
                                        <span data-label="Buy Qty">{r.buy}</span>
                                        <span data-label="Get Qty">{r.get}</span>
                                        <span class="dms-muted" data-label="Note">{r.note}</span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Bundle Lines -->
                        <template lwc:if={selected.hasBundle}>
                            <h3 class="dms-detail__sub">Bundle Lines (SKUs in the combo)</h3>
                            <div class="dms-tbl dms-tbl_child">
                                <div class="dms-thead"><span>Product</span><span>Qty</span><span>Line Role</span></div>
                                <template for:each={selected.bundleRows} for:item="r">
                                    <div key={r.key} class="dms-trow">
                                        <span class="dms-strong" data-label="Product">{r.product}</span>
                                        <span data-label="Qty">{r.qty}</span>
                                        <span data-label="Line Role">{r.role}</span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Eligibility -->
                        <template lwc:if={selected.hasEligibility}>
                            <h3 class="dms-detail__sub">Eligibility (who it applies to)</h3>
                            <div class="dms-tbl dms-tbl_child">
                                <div class="dms-thead dms-thead_4"><span>Region</span><span>Channel</span><span>Outlet Type</span><span>Tag</span></div>
                                <template for:each={selected.eligRows} for:item="r">
                                    <div key={r.key} class="dms-trow dms-trow_4">
                                        <span class="dms-strong" data-label="Region">{r.region}</span>
                                        <span data-label="Channel">{r.channel}</span>
                                        <span data-label="Outlet Type">{r.outletType}</span>
                                        <span data-label="Tag">{r.tag}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </section>
                </template>
            </template>

            <!-- ======================= Scheme Claims ===================== -->
            <template lwc:if={isClaims}>
                <div class="dms-note">
                    <strong>Settlement:</strong> cumulative schemes are counted after the cycle. The back office reviews the
                    earned benefit and a Claim is raised per distributor (Draft → Approved → Settled). Credit notes are issued
                    in SAP and shown in the DMS.
                </div>

                <div class="dms-tbl dms-tbl_claims">
                    <div class="dms-thead">
                        <span>Claim ID</span><span>Scheme</span><span>Distributor</span>
                        <span class="dms-num">Claim Amount</span><span>Status</span>
                    </div>
                    <template for:each={claimRows} for:item="c">
                        <div key={c.key} class="dms-trow">
                            <span class="dms-code" data-label="Claim ID">{c.id}</span>
                            <span class="dms-strong" data-label="Scheme">{c.scheme}</span>
                            <span data-label="Distributor">{c.distributor}</span>
                            <span class="dms-num dms-strong" data-label="Claim Amount">{c.amountLabel}</span>
                            <span data-label="Status">
                                <c-dms-status-badge label={c.status} theme={c.statusTheme}></c-dms-status-badge>
                            </span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</template>
