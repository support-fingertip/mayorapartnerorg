<template>
    <lightning-card title="Raise a Support Ticket" icon-name="standard:feedback">
        <div class="slds-p-horizontal_small slds-p-bottom_medium">
            <lightning-input type="text" label="Subject" value={subject} onchange={handleSubject}></lightning-input>
            <lightning-input type="text" label="Description" value={description} onchange={handleDescription} class="slds-m-top_x-small"></lightning-input>
            <div class="slds-grid slds-gutters slds-grid_vertical-align-end slds-m-top_x-small">
                <div class="slds-col slds-size_2-of-5">
                    <lightning-combobox label="Category" options={categoryOptions} value={category} onchange={handleCategory}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_2-of-5">
                    <lightning-combobox label="Priority" options={priorityOptions} value={priority} onchange={handlePriority}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-5">
                    <lightning-button label="Raise" variant="brand" disabled={isSubmitDisabled} onclick={submit}></lightning-button>
                </div>
            </div>
        </div>
    </lightning-card>

    <lightning-card title="My Tickets" icon-name="standard:feedback" class="slds-m-top_small">
        <div class="slds-p-horizontal_small slds-p-bottom_medium">
            <template if:true={error}>
                <div class="slds-text-color_error slds-p-around_small">{error}</div>
            </template>
            <template if:true={hasRows}>
                <lightning-datatable key-field="Id" data={rows} columns={columns} hide-checkbox-column="true"></lightning-datatable>
            </template>
            <template if:false={hasRows}>
                <p class="slds-p-around_small slds-text-body_small">No tickets yet.</p>
            </template>
        </div>
    </lightning-card>
</template>
