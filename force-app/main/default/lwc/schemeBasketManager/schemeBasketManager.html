<template>
    <c-bulk-entry-grid title="Scheme Baskets — bulk entry" columns={parentColumns} records={parentRows} onsave={handleSaveParents}></c-bulk-entry-grid>

    <div class="slds-box slds-theme_shade slds-m-vertical_small">
        <lightning-combobox label="Manage Basket Products for Scheme Basket"
            placeholder="Select a Scheme Basket" options={parentOptions}
            value={selectedParentId} onchange={handleParentSelect}></lightning-combobox>
    </div>

    <template if:true={hasParentSelected}>
        <c-bulk-entry-grid title="Basket Products — bulk entry" columns={childColumns} records={childRows} onsave={handleSaveChildren}></c-bulk-entry-grid>
    </template>
</template>
