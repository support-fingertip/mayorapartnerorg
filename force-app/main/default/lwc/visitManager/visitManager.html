                </div>
            </template>

            <!-- TICKET / COMPLAINT -->
            <template if:true={isTicketActivity}>
                <div class="vm-activity-form">
                    <template if:true={ticketIsLoading}>
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </template>
                    <!-- Existing tickets -->
                    <template if:true={hasVisitTickets}>
                        <div class="vm-card slds-m-bottom_small">
                            <p class="vm-section-title">Tickets for this Visit</p>
                            <template for:each={visitTickets} for:item="tkt">
                                <div key={tkt.Id} class="vm-rec-row">
                                    <div class="vm-rec-info">
                                        <span class="vm-rec-name">{tkt.Name} — {tkt.Subject__c}</span>
                                        <span class="vm-rec-sub">{tkt.Category__c} | {tkt.Priority__c} |
                                            {tkt.Status__c}</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <!-- Create form -->
                    <div class="vm-card">
                        <p class="vm-section-title">Log New Ticket</p>
                        <lightning-combobox label="Category" value={ticketForm.category} options={ticketCategoryOptions}
                            data-field="category" onchange={handleTicketFormChange}
                            placeholder="Select category..."></lightning-combobox>
                        <lightning-combobox label="Priority" value={ticketForm.priority} options={ticketPriorityOptions}
                            data-field="priority" onchange={handleTicketFormChange}></lightning-combobox>
                        <lightning-input label="Subject" value={ticketForm.subject} data-field="subject"
                            onchange={handleTicketFormChange} required></lightning-input>
                        <lightning-textarea label="Description" value={ticketForm.description} data-field="description"
                            onchange={handleTicketFormChange}></lightning-textarea>
                    </div>
                    <div class="vm-activity-actions">
                        <button class="slds-button slds-button_neutral" onclick={handleActivityBack}>Back</button>
                        <button class="slds-button slds-button_brand" onclick={handleTicketSave}
                            disabled={ticketIsLoading}>Create Ticket</button>
                    </div>
                </div>
            </template>

            <!-- ORDER ENTRY (embedded child LWC) -->
            <template if:true={isOrderActivity}>
                <c-order-entry-form account-id={activeAccountId} visit-id={activeVisitId}
                    draft-order-id={editDraftOrderId} onsuccess={handleActivityFormSuccess}
                    oncancel={handleActivityBack}>
                </c-order-entry-form>
            </template>

            <!-- COLLECTION (embedded child LWC) -->
            <template if:true={isCollectionActivity}>
                <c-collection-entry account-id={activeAccountId} visit-id={activeVisitId}
                    onsuccess={handleActivityFormSuccess} oncancel={handleActivityBack}>
                </c-collection-entry>
            </template>

            <!-- RETURNS (embedded child LWC) -->
            <template if:true={isReturnsActivity}>
                <c-return-order-form account-id={activeAccountId} visit-id={activeVisitId}
                    onsuccess={handleActivityFormSuccess} oncancel={handleActivityBack}>
                </c-return-order-form>
            </template>
        </div>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN: COMPLETED VISIT DETAIL                    -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isVisitDetailScreen}>
        <div class="vm-container">
            <!-- Nav Header with Back Arrow -->
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <button class="vm-nav-back" onclick={handleBackToBoardFromDetail} title="Back to Visit Board">
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small"
                            variant="inverse"></lightning-icon>
                    </button>
                    <span class="vm-header-title">Visit Details</span>
                </div>
            </div>

            <!-- Visit Header Card -->
            <div class="vm-visit-header">
                <div class="vm-visit-header-top">
                    <div class="vm-visit-outlet-info">
                        <span class="vm-visit-seq-circle">{detailSequence}</span>
                        <div>
                            <p class="vm-visit-outlet-name">{detailOutletName}</p>
                            <div class="vm-visit-badges">
                                <span class="vm-badge-beat">{detailBeatName}</span>
                                <template if:true={detailIsAdHoc}>
                                    <span class="vm-badge-adhoc">Ad-Hoc</span>
                                </template>
                                <template if:true={detailIsProductive}>
                                    <span class="vm-badge-prod">Productive</span>
                                </template>
                                <template if:false={detailIsProductive}>
                                    <span class="vm-badge-nonprod">Non-Productive</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="vm-visit-kpis">
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCheckInTime}</span>
                        <span class="vm-kpi-lbl">Check In</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCheckOutTime}</span>
                        <span class="vm-kpi-lbl">Check Out</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailDuration}</span>
                        <span class="vm-kpi-lbl">Duration</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailOrdersCount}</span>
                        <span class="vm-kpi-lbl">Orders</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailOrderValue}</span>
                        <span class="vm-kpi-lbl">Value</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCollectionAmount}</span>
                        <span class="vm-kpi-lbl">Collection</span>
                    </div>
                </div>
            </div>

            <!-- Detail Tabs -->
            <div class="vm-tabs">
                <button class={detailOrdersTabCls} data-tab="orders" onclick={handleDetailTab}>
                    Orders
                    <template if:true={hasDetailOrders}>
                        <span class="vm-tab-badge">{detailOrders.length}</span>
                    </template>
                </button>
                <button class={detailCollectionsTabCls} data-tab="collections" onclick={handleDetailTab}>
                    Collections
                    <template if:true={hasDetailCollections}>
                        <span class="vm-tab-badge">{detailCollections.length}</span>
                    </template>
                </button>
                <button class={detailReturnsTabCls} data-tab="returns" onclick={handleDetailTab}>
                    Returns
                    <template if:true={hasDetailReturns}>
                        <span class="vm-tab-badge">{detailReturns.length}</span>
                    </template>
                </button>
                <button class={detailSurveysTabCls} data-tab="surveys" onclick={handleDetailTab}>
                    Surveys
                    <template if:true={hasDetailSurveyResponses}>
                        <span class="vm-tab-badge">{detailSurveyResponses.length}</span>
                    </template>
                </button>
                <button class={detailTicketsTabCls} data-tab="tickets" onclick={handleDetailTab}>
                    Tickets
                    <template if:true={hasDetailTickets}>
                        <span class="vm-tab-badge">{detailTickets.length}</span>
                    </template>
                </button>
                <button class={detailMerchandisingTabCls} data-tab="merchandising" onclick={handleDetailTab}>
                    Merchandising
                    <template if:true={hasDetailMerchandising}>
                        <span class="vm-tab-badge">{detailMerchandising.length}</span>
                    </template>
                </button>
                <button class={detailCompetitorTabCls} data-tab="competitor" onclick={handleDetailTab}>
                    Competitor
                    <template if:true={hasDetailCompetitorEntries}>
                        <span class="vm-tab-badge">{detailCompetitorEntries.length}</span>
                    </template>
                </button>
            </div>

            <!-- Orders Tab -->
            <template if:true={isDetailOrdersTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailOrders}>
                        <template for:each={detailOrders} for:item="order">
                            <div key={order.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{order.Name}</span>
                                    <span class="vm-rec-sub">{order.Status__c} - {order.Total_Items__c} items</span>
                                </div>
                                <span class="vm-rec-amt">{order.amountFormatted}</span>
                                <lightning-button-icon icon-name="utility:download" alternative-text="Download PDF"
                                    variant="bare" size="small" data-id={order.Id} onclick={handleDownloadOrderPdf}
                                    class="slds-m-left_x-small" title="Download PDF"></lightning-button-icon>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailOrders}>
                        <div class="vm-empty">
                            <p>No orders placed during this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Collections Tab -->
            <template if:true={isDetailCollectionsTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailCollections}>
                        <template for:each={detailCollections} for:item="col">
                            <div key={col.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{col.Name}</span>
                                    <span class="vm-rec-sub">{col.Payment_Mode__c} - {col.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{col.amountFormatted}</span>
                                <lightning-button-icon icon-name="utility:download" alternative-text="Download Receipt"
                                    variant="bare" size="small" data-id={col.Id} onclick={handleDownloadReceipt}
                                    class="slds-m-left_x-small" title="Download Receipt"></lightning-button-icon>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailCollections}>
                        <div class="vm-empty">
                            <p>No collections recorded during this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Returns Tab -->
            <template if:true={isDetailReturnsTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailReturns}>
                        <template for:each={detailReturns} for:item="ret">
                            <div key={ret.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{ret.Name}</span>
                                    <span class="vm-rec-sub">{ret.Return_Reason__c} - {ret.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{ret.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailReturns}>
                        <div class="vm-empty">
                            <p>No returns recorded during this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Surveys Tab -->
            <template if:true={isDetailSurveysTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailSurveyResponses}>
                        <template for:each={detailSurveyResponses} for:item="resp">
                            <div key={resp.id} class="vm-survey-resp-card">
                                <div class="vm-survey-resp-header">
                                    <span class="vm-rec-name">{resp.surveyName}</span>
                                    <span class="vm-rec-sub">{resp.responseDateFmt}</span>
                                </div>
                                <template for:each={resp.answers} for:item="ans">
                                    <div key={ans.id} class="vm-survey-ans-row">
                                        <p class="vm-survey-ans-q">{ans.questionText}</p>
                                        <template if:true={ans.isRating}>
                                            <div class="vm-star-rating vm-star-rating-sm">
                                                <template for:each={ans.ratingStars} for:item="s">
                                                    <span key={s.value} class={s.cls}>&#9733;</span>
                                                </template>
                                            </div>
                                        </template>
                                        <template if:true={ans.isPhoto}>
                                            <template if:true={ans.photoURL}>
                                                <img src={ans.photoURL} alt="Survey photo" class="vm-survey-photo" />
                                            </template>
                                        </template>
                                        <template if:false={ans.isRating}>
                                            <template if:false={ans.isPhoto}>
                                                <p class="vm-survey-ans-v">{ans.displayValue}</p>
                                            </template>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailSurveyResponses}>
                        <div class="vm-empty">
                            <p>No survey responses recorded for this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Tickets Tab -->
            <template if:true={isDetailTicketsTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailTickets}>
                        <template for:each={detailTickets} for:item="ticket">
                            <div key={ticket.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{ticket.Subject__c}</span>
                                    <span class="vm-rec-sub">{ticket.Category__c} - {ticket.Priority__c} -
                                        {ticket.Status__c}</span>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailTickets}>
                        <div class="vm-empty">
                            <p>No tickets logged during this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Merchandising Tab -->
            <template if:true={isDetailMerchandisingTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailMerchandising}>
                        <template for:each={detailMerchandising} for:item="merch">
                            <div key={merch.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{merch.Name}</span>
                                    <span class="vm-rec-sub">
                                        POSM: {merch.POSM_Present__c} |
                                        Planogram: {merch.Planogram_Compliant__c} |
                                        Own Share: {merch.Own_Shelf_Share__c}%
                                    </span>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailMerchandising}>
                        <div class="vm-empty">
                            <p>No merchandising audit for this visit.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Competitor Tab -->
            <template if:true={isDetailCompetitorTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailCompetitorEntries}>
                        <template for:each={detailCompetitorEntries} for:item="comp">
                            <div key={comp.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{comp.Competitor_Name__c}</span>
                                    <span class="vm-rec-sub">{comp.Product_Observed__c} - {comp.Notes__c}</span>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailCompetitorEntries}>
                        <div class="vm-empty">
                            <p>No competitor entries for this visit.</p>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>

    <!-- AD-HOC MODAL (global — accessible from any screen) -->
    <template if:true={showAdHocModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" variant="bare-inverse" class="slds-modal__close"
                        onclick={handleAdHocClose}></lightning-button-icon>
                    <h2 class="slds-modal__title">Ad-Hoc Visit</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="slds-m-bottom_small">Search by customer name or customer code:</p>
                    <div class="vm-search-wrapper">
                        <lightning-input label="Search Outlet" value={adHocSearchTerm}
                            placeholder="Customer name or code..." onchange={handleAdHocSearch}></lightning-input>
                        <template if:true={showAdHocDropdown}>
                            <div class="vm-dropdown vm-dropdown-modal">
                                <template for:each={adHocSearchResults} for:item="outlet">
                                    <div key={outlet.id} class="vm-dropdown-item" data-id={outlet.id}
                                        onclick={handleAdHocSelect}>
                                        <span class="vm-dropdown-name">{outlet.name}</span>
                                        <span class="vm-dropdown-sub">{outlet.code} - {outlet.address}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <template if:true={adHocSelectedAccount}>
                        <div class="vm-selected-box slds-m-top_small">
                            <span class="vm-selected-name">{adHocSelectedAccount.name}</span>
                            <span class="vm-selected-sub">{adHocSelectedAccount.code} -
                                {adHocSelectedAccount.address}</span>
                        </div>
                    </template>
                    <div class="slds-m-top_small">
                        <lightning-combobox label="Reason" value={adHocReason} options={adHocReasonOptions}
                            onchange={handleAdHocReasonChange} placeholder="Select reason..."></lightning-combobox>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleAdHocClose}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleAdHocConfirm}
                        disabled={adHocSubmitDisabled}>Check In</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- GEO-FENCE WARNING MODAL -->
    <template if:true={showGeofenceWarning}>
        <section class="slds-modal slds-fade-in-open vm-geofence-modal">
            <div class="slds-modal__container vm-geofence-container">
                <header class="slds-modal__header vm-geofence-header">
                    <h2 class="slds-modal__title vm-geofence-title">
                        <lightning-icon icon-name="utility:warning" size="small" variant="inverse"
                            class="slds-m-right_x-small"></lightning-icon>
                        Outside Geofence
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium vm-geofence-content">
                    <p class="vm-geofence-message">{geofenceWarningMessage}</p>
                    <div class="vm-geofence-stats">
                        <div class="vm-geofence-stat">
                            <span class="vm-geofence-stat-label">Distance to outlet</span>
                            <span class="vm-geofence-stat-value">{geofenceDistance} m</span>
                        </div>
                        <div class="vm-geofence-stat">
                            <span class="vm-geofence-stat-label">Geofence radius</span>
                            <span class="vm-geofence-stat-value">{geofenceRadius} m</span>
                        </div>
                    </div>
                    <p class="vm-geofence-help">
                        You appear to be outside the outlet&apos;s geofence. If this is correct and
                        you&apos;re really at the store, you can proceed — the check-in will be
                        flagged in reports. Otherwise please cancel and move closer to the outlet.
                    </p>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleGeofenceCancel}>
                        Cancel
                    </button>
                    <button class="slds-button slds-button_destructive" onclick={handleGeofenceConfirm}>
                        Proceed Anyway
                    </button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Spinner Overlay -->
    <template if:true={isProcessing}>
        <div class="vm-spinner">
            <lightning-spinner alternative-text="Processing" size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Camera Overlay -->
    <template if:true={showCameraOverlay}>
        <div class="vm-camera-overlay">
            <div class="vm-camera-header">
                <span class="vm-camera-title">Take Selfie</span>
                <button class="vm-camera-close" onclick={handleCameraClose}>&#x2715;</button>
            </div>
            <div class="vm-camera-body" lwc:dom="manual"></div>
            <div class="vm-camera-footer">
                <button class="vm-camera-capture-btn" onclick={handleCameraCapture}>
                    <span class="vm-camera-shutter"></span>
                </button>
            </div>
        </div>
    </template>
</template>
