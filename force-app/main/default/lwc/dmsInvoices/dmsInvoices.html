<template>
    <div class="dms-invoices">
        <!-- Sub-tabs -->
        <div class="dms-subtabs" role="tablist">
            <template for:each={subTabs} for:item="tab">
                <button key={tab.id} class={tab.class} data-tab={tab.id} onclick={handleTab} type="button">
                    {tab.label}
                </button>
            </template>
        </div>

        <div class="dms-body">
            <!-- ====================== Primary ====================== -->
            <template lwc:if={isPrimary}>
                <div class="dms-toolbar">
                    <div class="dms-filters">
                        <div class="dms-filter">
                            <span class="dms-filter__label">List:</span>
                            <lightning-combobox variant="label-hidden" value={grnFilter} options={grnOptions} onchange={handleGrnFilter}></lightning-combobox>
                        </div>
                        <div class="dms-filter">
                            <span class="dms-filter__label">Date:</span>
                            <lightning-combobox variant="label-hidden" value={dateFilter} options={dateOptions} onchange={handleDateFilter}></lightning-combobox>
                        </div>
                    </div>
                    <span class="dms-readonly">
                        <svg class="dms-ic dms-ic_sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        Read-only — synced from SAP / Mayora India
                    </span>
                </div>

                <div class="dms-chips">
                    <template for:each={primarySummary} for:item="c">
                        <div key={c.id} class="dms-chip">
                            <span class="dms-chip__label">{c.label}</span>
                            <span class={c.cls}>{c.value}</span>
                        </div>
                    </template>
                </div>

                <div class="dms-tbl dms-tbl_primary">
                    <div class="dms-thead">
                        <span>Invoice No. (SAP)</span><span>Date</span><span>Supplier</span>
                        <span>Order Ref</span><span class="dms-num">Amount</span>
                        <span>GRN Status</span><span>Action</span>
                    </div>
                    <template for:each={primaryInvoices} for:item="i">
                        <div key={i.key} class="dms-trow">
                            <span class="dms-link" data-label="Invoice No. (SAP)">{i.id}</span>
                            <span data-label="Date">{i.date}</span>
                            <span data-label="Supplier">{i.supplier}</span>
                            <span class="dms-muted" data-label="Order Ref">{i.orderRef}</span>
                            <span class="dms-num dms-strong" data-label="Amount">{i.amountLabel}</span>
                            <span data-label="GRN Status">
                                <span class={i.grnClass}>
                                    <svg class="dms-ic dms-ic_xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <template lwc:if={i.grnDone}>
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </template>
                                        <template lwc:else>
                                            <circle cx="12" cy="12" r="9"></circle>
                                            <polyline points="12 8 12 12 15 14"></polyline>
                                        </template>
                                    </svg>
                                    {i.grnLabel}
                                </span>
                            </span>
                            <span class="dms-action" data-label="Action">
                                <svg class="dms-ic dms-ic_sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                View
                            </span>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ===================== Secondary ===================== -->
            <template lwc:if={isSecondary}>
                <div class="dms-toolbar">
                    <div class="dms-filters">
                        <div class="dms-filter">
                            <span class="dms-filter__label">Date:</span>
                            <lightning-combobox variant="label-hidden" value={dateFilter} options={dateOptions} onchange={handleDateFilter}></lightning-combobox>
                        </div>
                    </div>
                    <button class="dms-btn" type="button" onclick={openWizard}>
                        <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        New Invoice
                    </button>
                </div>

                <div class="dms-chips">
                    <template for:each={secondarySummary} for:item="c">
                        <div key={c.id} class="dms-chip">
                            <span class="dms-chip__label">{c.label}</span>
                            <span class={c.cls}>{c.value}</span>
                        </div>
                    </template>
                </div>

                <div class="dms-tbl dms-tbl_secondary">
                    <div class="dms-thead">
                        <span>Invoice ID</span><span>Date</span><span>Customer</span>
                        <span>Type</span><span>Order Ref</span>
                        <span class="dms-num">Amount</span><span>Action</span>
                    </div>
                    <template for:each={secondaryInvoices} for:item="i">
                        <div key={i.key} class="dms-trow">
                            <span class="dms-link" data-label="Invoice ID">{i.id}</span>
                            <span data-label="Date">{i.date}</span>
                            <span class="dms-strong" data-label="Customer">{i.customer}</span>
                            <span data-label="Type">
                                <c-dms-status-badge label={i.type} theme={i.typeTheme}></c-dms-status-badge>
                            </span>
                            <span class="dms-muted" data-label="Order Ref">{i.orderRef}</span>
                            <span class="dms-num dms-strong" data-label="Amount">{i.amountLabel}</span>
                            <span class="dms-action" data-label="Action">
                                <svg class="dms-ic dms-ic_sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                PDF
                            </span>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ===================== Create Invoice wizard ===================== -->
        <template lwc:if={wizardOpen}>
            <div class="dms-modal__overlay" onclick={closeWizard}></div>
            <div class="dms-wizard" role="dialog">
                <header class="dms-wizard__head">
                    <div class="dms-wizard__title">
                        <h2>Create Invoice</h2>
                        <div class="dms-steps">
                            <template for:each={stepDots} for:item="d">
                                <span key={d.n} class={d.class}>{d.n}</span>
                            </template>
                            <span class="dms-steps__label">{stepLabel}</span>
                        </div>
                    </div>
                    <button class="dms-cart__close" type="button" onclick={closeWizard} title="Close">
                        <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </header>

                <div class="dms-wizard__body">
                    <!-- Step 1: Select Customer -->
                    <template lwc:if={isStep1}>
                        <p class="dms-wizard__label">Customer Type</p>
                        <div class="dms-segs">
                            <template for:each={custTypeButtons} for:item="b">
                                <button key={b.type} class={b.class} data-type={b.type} onclick={setCustType} type="button">
                                    {b.type}
                                </button>
                            </template>
                        </div>
                        <p class="dms-wizard__label">Select Customer</p>
                        <div class="dms-custlist">
                            <template for:each={customerList} for:item="c">
                                <button key={c.name} class={c.class} data-name={c.name} onclick={selectCustomer} type="button">
                                    <span class="dms-custrow__name">{c.name}</span>
                                    <c-dms-status-badge label={c.type} theme={c.typeTheme}></c-dms-status-badge>
                                </button>
                            </template>
                        </div>
                    </template>

                    <!-- Step 2: Select Orders -->
                    <template lwc:if={isStep2}>
                        <div class="dms-wizard__subhead">
                            <span class="dms-wizard__cust">{selectedCustomer}</span>
                            <span class="dms-wizard__count">{selectedCountLabel}</span>
                        </div>
                        <div class="dms-ordlist">
                            <template for:each={orderList} for:item="o">
                                <button key={o.key} class={o.rowClass} data-id={o.id} onclick={toggleOrder} type="button">
                                    <span class={o.boxClass}>
                                        <svg class="dms-ic dms-ic_xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </svg>
                                    </span>
                                    <span class="dms-ordrow__main">
                                        <span class="dms-ordrow__id">{o.id}</span>
                                        <span class="dms-ordrow__meta">{o.metaLabel}</span>
                                        <span class="dms-ordrow__prods">{o.productsLabel}</span>
                                    </span>
                                    <span class="dms-ordrow__amt">{o.amountLabel}</span>
                                </button>
                            </template>
                        </div>
                    </template>

                    <!-- Step 3: Review & Save -->
                    <template lwc:if={isStep3}>
                        <p class="dms-review__hint">
                            Review quantities. You can reduce invoice quantity below ordered quantity.
                        </p>
                        <div class="dms-tbl dms-tbl_review">
                            <div class="dms-thead">
                                <span>Product</span><span class="dms-num">Ordered Qty</span>
                                <span>Invoice Qty</span><span class="dms-num">Rate</span>
                                <span class="dms-num">Amount</span>
                            </div>
                            <template for:each={reviewRows} for:item="r">
                                <div key={r.key} class="dms-trow">
                                    <span class="dms-strong" data-label="Product">{r.name}</span>
                                    <span class="dms-num" data-label="Ordered Qty">{r.ordered}</span>
                                    <span data-label="Invoice Qty">
                                        <input class="dms-qtyinput" type="number" min="0" max={r.ordered} value={r.qty} data-id={r.id} onchange={handleQty} />
                                    </span>
                                    <span class="dms-num dms-muted" data-label="Rate">{r.rateLabel}</span>
                                    <span class="dms-num dms-strong" data-label="Amount">{r.amountLabel}</span>
                                </div>
                            </template>
                        </div>
                        <div class="dms-invtotal">
                            <span class="dms-invtotal__label">Invoice Total</span>
                            <span class="dms-invtotal__value">{invoiceTotalLabel}</span>
                        </div>
                    </template>
                </div>

                <footer class="dms-wizard__foot">
                    <button class="dms-btn dms-btn_outline" type="button" onclick={backStep}>
                        ‹ <template lwc:if={isStep1}>Cancel</template><template lwc:else>Back</template>
                    </button>
                    <button class="dms-btn" type="button" onclick={nextStep} disabled={nextDisabled}>
                        <template lwc:if={isStep3}>Generate Invoice</template>
                        <template lwc:else>Next ›</template>
                    </button>
                </footer>
            </div>
        </template>

        <!-- Invoice generated confirmation -->
        <template lwc:if={showSuccess}>
            <div class="dms-modal__overlay"></div>
            <div class="dms-modal" role="dialog">
                <div class="dms-modal__check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2 class="dms-modal__title">Invoice Generated</h2>
                <p class="dms-modal__summary">{successSummary}</p>
                <button class="dms-btn dms-modal__done" type="button" onclick={handleDone}>Done</button>
            </div>
        </template>
    </div>
</template>
