<template>
    <lightning-card title="FA Battleground — Games" icon-name="standard:reward">

        <!-- ===== LANDING: all games + status ===== -->
        <template if:true={isList}>
            <lightning-button slot="actions" label="Manage Teams" icon-name="utility:groups" onclick={handleManageTeams} class="slds-m-right_x-small"></lightning-button>
            <lightning-button slot="actions" label="Manage KPIs" icon-name="utility:metrics" onclick={handleManageKpis} class="slds-m-right_x-small"></lightning-button>
            <lightning-button slot="actions" label="Recalculate Scores" icon-name="utility:refresh" onclick={handleRecalcAll} class="slds-m-right_x-small"></lightning-button>
            <lightning-button slot="actions" label="Create Game" variant="brand" icon-name="utility:add" onclick={handleNewGame}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <template if:true={hasGames}>
                    <lightning-datatable key-field="Id" data={games} columns={gameColumns} onrowaction={handleGameRowAction} hide-checkbox-column></lightning-datatable>
                </template>
                <template if:false={hasGames}>
                    <p class="slds-text-color_weak slds-p-vertical_medium slds-text-align_center">
                        No games yet — click <strong>Create Game</strong> to set one up.
                    </p>
                </template>
            </div>
        </template>

        <!-- ===== TEAMS AREA ===== -->
        <template if:true={isTeams}>
            <lightning-button slot="actions" label="Back to Games" icon-name="utility:back" onclick={handleBackToList}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <p class="slds-text-color_weak slds-p-bottom_small">
                    Create teams and add the salespeople who belong to them. Teams appear in the game wizard.
                </p>

                <template if:true={isTeamList}>
                    <div class="slds-clearfix slds-m-bottom_small">
                        <lightning-button class="slds-float_right" label="New Team" variant="brand" icon-name="utility:add" onclick={handleNewTeam}></lightning-button>
                    </div>
                    <template if:true={hasTeams}>
                        <lightning-datatable key-field="Id" data={teamRows} columns={teamColumns} onrowaction={handleTeamRowAction} hide-checkbox-column></lightning-datatable>
                    </template>
                    <template if:false={hasTeams}>
                        <p class="slds-text-color_weak slds-p-vertical_medium slds-text-align_center">
                            No teams yet — click <strong>New Team</strong> to add one.
                        </p>
                    </template>
                </template>

                <template if:true={isTeamForm}>
                    <div class="slds-box slds-m-top_x-small slds-p-around_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_medium">{teamFormTitle}</h3>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input label="Team Name" value={teamForm.Name} data-field="Name" onchange={handleTeamField} required></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input label="Team Code" value={teamForm.Team_Code__c} data-field="Team_Code__c" onchange={handleTeamField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-p-bottom_x-small">
                                <lightning-combobox label="Level" value={teamForm.Level__c} options={levelOptions} data-field="Level__c" onchange={handleTeamField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-p-bottom_x-small">
                                <lightning-input label="State" value={teamForm.State__c} data-field="State__c" onchange={handleTeamField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-grid slds-grid_vertical-align-end slds-p-bottom_x-small">
                                <lightning-input type="checkbox" label="Active" checked={teamForm.Is_Active__c} data-field="Is_Active__c" onchange={handleTeamField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-p-top_x-small">
                                <lightning-dual-listbox name="teamUsers" label="Team Members"
                                    source-label="Available Users" selected-label="In Team"
                                    options={userOptions} value={teamMemberIds} onchange={handleTeamUsers}
                                    field-level-help="Search and move salespeople into this team"></lightning-dual-listbox>
                            </div>
                        </div>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancel" onclick={handleTeamCancel} class="slds-m-right_x-small"></lightning-button>
                            <lightning-button label={teamSaveLabel} variant="brand" onclick={handleTeamSave} disabled={savingTeam}></lightning-button>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- ===== MANAGE BATTLEGROUND KPIs ===== -->
        <template if:true={isKpis}>
            <lightning-button slot="actions" label="Back to Games" icon-name="utility:back" onclick={handleBackToList}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <p class="slds-text-color_weak slds-p-bottom_small">
                    Define the Battleground KPIs here first — they appear in the "Select KPIs" step when you create a game.
                </p>

                <template if:true={isKpiList}>
                    <div class="slds-clearfix slds-m-bottom_small">
                        <lightning-button class="slds-float_right" label="New KPI" variant="brand" icon-name="utility:add" onclick={handleNewKpi}></lightning-button>
                    </div>
                    <template if:true={hasKpis}>
                        <lightning-datatable key-field="Id" data={kpiRows} columns={kpiListColumns} onrowaction={handleKpiRowAction} hide-checkbox-column></lightning-datatable>
                    </template>
                    <template if:false={hasKpis}>
                        <p class="slds-text-color_weak slds-p-vertical_medium slds-text-align_center">
                            No KPIs yet — click <strong>New KPI</strong> to add one.
                        </p>
                    </template>
                </template>

                <template if:true={isKpiForm}>
                    <div class="slds-box slds-m-top_x-small slds-p-around_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_medium">{kpiFormTitle}</h3>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input label="KPI Name" value={kpiForm.Name} data-field="Name" onchange={handleKpiField} required></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Category" value={kpiForm.Category__c} options={categoryOptions} data-field="Category__c" onchange={handleKpiField} required placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Frequency" value={kpiForm.Frequency__c} options={frequencyOptions} data-field="Frequency__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Measure" value={kpiForm.Measure__c} options={measureOptions} data-field="Measure__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="KPI Metric (source for the actual)" value={kpiForm.KPI_Metric__c} options={metricOptions} data-field="KPI_Metric__c" onchange={handleKpiField} placeholder="-- None --"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-grid slds-grid_vertical-align-end slds-p-bottom_x-small">
                                <lightning-input type="checkbox" label="Qualifier (gate, no coins)" checked={kpiForm.Is_Qualifier__c} data-field="Is_Qualifier__c" onchange={handleKpiField} class="slds-p-right_medium"></lightning-input>
                                <lightning-input type="checkbox" label="Active" checked={kpiForm.Is_Active__c} data-field="Is_Active__c" onchange={handleKpiField}></lightning-input>
                            </div>
                        </div>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancel" onclick={handleKpiCancel} class="slds-m-right_x-small"></lightning-button>
                            <lightning-button label={kpiSaveLabel} variant="brand" onclick={handleKpiSave} disabled={savingKpi}></lightning-button>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- ===== GAME WIZARD ===== -->
        <template if:true={isWizard}>
            <div class="slds-p-around_medium">
                <h2 class="slds-text-heading_medium slds-m-bottom_small">{wizardTitle}</h2>
                <lightning-progress-indicator current-step={stepLabel} type="path">
                    <lightning-progress-step label="Game" value="Game"></lightning-progress-step>
                    <lightning-progress-step label="Teams" value="Teams"></lightning-progress-step>
                    <lightning-progress-step label="KPIs" value="KPIs"></lightning-progress-step>
                    <lightning-progress-step label="Parameters" value="Parameters"></lightning-progress-step>
                    <lightning-progress-step label="Review" value="Review"></lightning-progress-step>
                </lightning-progress-indicator>

                <!-- Step 1: Game definition -->
                <template if:true={isStep1}>
                    <div class="slds-grid slds-gutters slds-wrap slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input label="Game Name" value={gameName} data-field="gameName" onchange={handleField} required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-combobox label="Type" value={gameType} options={gameTypeOptions} onchange={handleGameType}></lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input type="date" label="Start Date" value={startDate} data-field="startDate" onchange={handleField}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input type="date" label="End Date" value={endDate} data-field="endDate" onchange={handleField}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-top_large">
                            <lightning-input type="checkbox" label="Active" checked={isActive} data-field="isActive" onchange={handleField}></lightning-input>
                        </div>
                    </div>
                </template>

                <!-- Step 2: Select teams -->
                <template if:true={isStep2}>
                    <div class="slds-m-top_medium">
                        <p class="slds-text-title_caps slds-m-bottom_x-small">Teams this game applies to</p>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <template for:each={teamChecks} for:item="t">
                                <div key={t.id} class="slds-col slds-size_1-of-3 slds-p-bottom_x-small">
                                    <div class="slds-box slds-box_x-small slds-grid slds-grid_vertical-align-center">
                                        <lightning-input type="checkbox" label={t.name} checked={t.checked} data-id={t.id} onchange={handleTeamCheck}></lightning-input>
                                        <template if:true={t.sub}>
                                            <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">{t.sub}</span>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <template if:false={hasTeams}>
                            <p class="slds-text-color_weak slds-p-vertical_medium">No teams exist yet — use <strong>Manage Teams</strong> first.</p>
                        </template>
                    </div>
                </template>

                <!-- Step 3: Select KPIs by category column -->
                <template if:true={isStep3}>
                    <div class="slds-m-top_medium">
                        <p class="slds-text-title_caps slds-m-bottom_x-small">Select KPIs by category</p>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <template for:each={kpiColumns} for:item="col">
                                <div key={col.key} class="slds-col slds-size_1-of-4">
                                    <div class="slds-box slds-box_x-small slds-p-around_small" style="min-height:14rem;">
                                        <div class="slds-text-heading_small slds-m-bottom_x-small">
                                            {col.label} <span class="slds-badge slds-m-left_xx-small">{col.count}</span>
                                        </div>
                                        <lightning-input type="search" variant="label-hidden" placeholder="Search..."
                                            data-cat={col.key} onchange={handleCatSearch} class="slds-m-bottom_x-small"></lightning-input>
                                        <template if:true={col.hasItems}>
                                            <template for:each={col.items} for:item="kpi">
                                                <div key={kpi.id} class="slds-p-vertical_xxx-small">
                                                    <lightning-input type="checkbox" label={kpi.name} checked={kpi.checked} data-id={kpi.id} onchange={handleKpiCheck}></lightning-input>
                                                </div>
                                            </template>
                                        </template>
                                        <template if:false={col.hasItems}>
                                            <p class="slds-text-body_small slds-text-color_weak">No KPIs</p>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Step 4: KPI parameters / slabs -->
                <template if:true={isStep4}>
                    <div class="slds-m-top_medium">
                        <p class="slds-text-title_caps slds-m-bottom_x-small">Define parameters for each KPI</p>
                        <template for:each={kpiParamCards} for:item="card">
                            <div key={card.id} class="slds-box slds-m-bottom_small slds-p-around_medium">
                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                    <div>
                                        <span class="slds-text-heading_small">{card.name}</span>
                                        <span class="slds-badge slds-m-left_x-small">{card.category}</span>
                                        <template if:true={card.isQualifier}>
                                            <span class="slds-badge slds-theme_warning slds-m-left_x-small">Qualifier — no coins</span>
                                        </template>
                                    </div>
                                    <template if:true={card.notQualifier}>
                                        <div class="slds-grid slds-grid_vertical-align-center">
                                            <lightning-input type="toggle" label="Use Slabs" checked={card.useSlabs}
                                                data-id={card.id} data-field="useSlabs" onchange={handleParamToggle}
                                                class="slds-m-right_medium"></lightning-input>
                                            <lightning-input type="toggle" label="Is Continuous" checked={card.isContinuous}
                                                data-id={card.id} data-field="isContinuous" onchange={handleParamToggle}></lightning-input>
                                        </div>
                                    </template>
                                </div>

                                <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_x-small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input label="Measure" value={card.measure} data-id={card.id} data-field="measure" onchange={handleParamField} placeholder="e.g. Number, %"></lightning-input>
                                    </div>
                                    <template if:true={card.notQualifier}>
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input label="Reward for the coins" value={card.reward} data-id={card.id} data-field="reward" onchange={handleParamField} placeholder="e.g. 500 voucher"></lightning-input>
                                        </div>
                                    </template>
                                </div>

                                <!-- slab rows -->
                                <template for:each={card.slabs} for:item="slab">
                                    <div key={slab.key} class="slds-grid slds-gutters slds-grid_vertical-align-end slds-m-bottom_xx-small">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input type="number" step="any" label={slab.label} value={slab.target}
                                                data-id={card.id} data-idx={slab.idx} data-field="target" onchange={handleSlabField}
                                                placeholder="Eligibility / target"></lightning-input>
                                        </div>
                                        <template if:true={card.notQualifier}>
                                            <div class="slds-col slds-size_1-of-3">
                                                <lightning-input type="number" label="Coins" value={slab.coins}
                                                    data-id={card.id} data-idx={slab.idx} data-field="coins" onchange={handleSlabField}
                                                    placeholder="Coins"></lightning-input>
                                            </div>
                                        </template>
                                        <template if:true={slab.canRemove}>
                                            <div class="slds-col slds-shrink-none slds-p-bottom_xx-small">
                                                <lightning-button-icon icon-name="utility:delete" variant="border-filled"
                                                    alternative-text="Remove slab" data-id={card.id} data-idx={slab.idx}
                                                    onclick={handleRemoveSlab}></lightning-button-icon>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <template if:true={card.showAddSlab}>
                                    <lightning-button label="Add Slab" icon-name="utility:add" variant="base"
                                        data-id={card.id} onclick={handleAddSlab} class="slds-m-top_xx-small"></lightning-button>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Step 5: Review -->
                <template if:true={isStep5}>
                    <div class="slds-box slds-m-top_medium">
                        <dl class="slds-dl_horizontal">
                            <dt class="slds-dl_horizontal__label">Game</dt>
                            <dd class="slds-dl_horizontal__detail">{gameName}</dd>
                            <dt class="slds-dl_horizontal__label">Type</dt>
                            <dd class="slds-dl_horizontal__detail">{reviewSummary.type}</dd>
                            <dt class="slds-dl_horizontal__label">Teams selected</dt>
                            <dd class="slds-dl_horizontal__detail">{reviewSummary.teams}</dd>
                            <dt class="slds-dl_horizontal__label">KPIs selected</dt>
                            <dd class="slds-dl_horizontal__detail">{reviewSummary.kpis}</dd>
                        </dl>
                        <p class="slds-text-color_weak">Click <strong>Save Game</strong> to create the game, its teams, KPIs, slabs and awards together.</p>
                    </div>
                </template>

                <!-- Wizard footer -->
                <div class="slds-m-top_medium slds-text-align_right">
                    <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
                    <template if:true={showBack}>
                        <lightning-button label="Back" onclick={handleBack} class="slds-m-right_x-small"></lightning-button>
                    </template>
                    <template if:false={isLastStep}>
                        <lightning-button label="Next" variant="brand" onclick={handleNext}></lightning-button>
                    </template>
                    <template if:true={isLastStep}>
                        <lightning-button label={saveLabel} variant="brand" onclick={handleSave} disabled={saving}></lightning-button>
                    </template>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
