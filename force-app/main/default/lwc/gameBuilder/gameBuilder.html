<template>
    <lightning-card title="FA Battleground — Games" icon-name="standard:reward">

        <!-- ===== LANDING: all games + status ===== -->
        <template if:true={isList}>
            <lightning-button slot="actions" label="Manage KPIs" icon-name="utility:metrics" onclick={handleManageKpis} class="slds-m-right_x-small"></lightning-button>
            <lightning-button slot="actions" label="Create Game" variant="brand" icon-name="utility:add" onclick={handleNewGame}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <template if:true={hasGames}>
                    <lightning-datatable key-field="Id" data={games} columns={gameColumns} hide-checkbox-column></lightning-datatable>
                </template>
                <template if:false={hasGames}>
                    <p class="slds-text-color_weak slds-p-vertical_medium slds-text-align_center">
                        No games yet — click <strong>Create Game</strong> to set one up.
                    </p>
                </template>
            </div>
        </template>

        <!-- ===== MANAGE BATTLEGROUND KPIs (clean list + form) ===== -->
        <template if:true={isKpis}>
            <lightning-button slot="actions" label="Back to Games" icon-name="utility:back" onclick={handleBackToList}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <p class="slds-text-color_weak slds-p-bottom_small">
                    Define the Battleground KPIs here first — they appear in the "Select KPIs" step when you create a game.
                </p>

                <template if:true={isKpiList}>
                    <div class="slds-clearfix slds-m-bottom_small">
                        <lightning-button class="slds-float_right" label="New KPI" variant="brand" icon-name="utility:add" onclick={handleNewKpi}></lightning-button>
                    </div>
                    <template if:true={hasKpis}>
                        <lightning-datatable key-field="Id" data={kpiRows} columns={kpiListColumns} onrowaction={handleKpiRowAction} hide-checkbox-column></lightning-datatable>
                    </template>
                    <template if:false={hasKpis}>
                        <p class="slds-text-color_weak slds-p-vertical_medium slds-text-align_center">
                            No KPIs yet — click <strong>New KPI</strong> to add one.
                        </p>
                    </template>
                </template>

                <template if:true={isKpiForm}>
                    <div class="slds-box slds-m-top_x-small slds-p-around_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_medium">{kpiFormTitle}</h3>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input label="KPI Name" value={kpiForm.Name} data-field="Name" onchange={handleKpiField} required></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input label="UI Name" value={kpiForm.UI_Name__c} data-field="UI_Name__c" onchange={handleKpiField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Category" value={kpiForm.Category__c} options={categoryOptions} data-field="Category__c" onchange={handleKpiField} required placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Frequency" value={kpiForm.Frequency__c} options={frequencyOptions} data-field="Frequency__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Objective" value={kpiForm.Objective__c} options={objectiveOptions} data-field="Objective__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Calculation" value={kpiForm.Calculation__c} options={calculationOptions} data-field="Calculation__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Measure" value={kpiForm.Measure__c} options={measureOptions} data-field="Measure__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="KPI Type" value={kpiForm.KPI_Type__c} options={kpiTypeOptions} data-field="KPI_Type__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="Tier" value={kpiForm.Tier__c} options={tierOptions} data-field="Tier__c" onchange={handleKpiField} placeholder="Select"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-input type="number" label="Sequence" value={kpiForm.Sequence__c} data-field="Sequence__c" onchange={handleKpiField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                                <lightning-combobox label="KPI Metric (for the actual)" value={kpiForm.KPI_Metric__c} options={metricOptions} data-field="KPI_Metric__c" onchange={handleKpiField} placeholder="-- None --"></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-grid slds-grid_vertical-align-end slds-p-bottom_x-small">
                                <lightning-input type="checkbox" label="Qualifier" checked={kpiForm.Is_Qualifier__c} data-field="Is_Qualifier__c" onchange={handleKpiField} class="slds-p-right_medium"></lightning-input>
                                <lightning-input type="checkbox" label="Incentive" checked={kpiForm.Is_Incentive__c} data-field="Is_Incentive__c" onchange={handleKpiField} class="slds-p-right_medium"></lightning-input>
                                <lightning-input type="checkbox" label="Active" checked={kpiForm.Is_Active__c} data-field="Is_Active__c" onchange={handleKpiField}></lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-p-bottom_x-small">
                                <lightning-textarea label="Description" value={kpiForm.Description__c} data-field="Description__c" onchange={handleKpiField}></lightning-textarea>
                            </div>
                        </div>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancel" onclick={handleKpiCancel} class="slds-m-right_x-small"></lightning-button>
                            <lightning-button label={kpiSaveLabel} variant="brand" onclick={handleKpiSave} disabled={savingKpi}></lightning-button>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- ===== WIZARD ===== -->
        <template if:true={isWizard}>
            <div class="slds-p-around_medium">
                <lightning-progress-indicator current-step={stepLabel} type="path">
                    <lightning-progress-step label="Game &amp; Team" value="Game &amp; Team"></lightning-progress-step>
                    <lightning-progress-step label="Select KPIs" value="Select KPIs"></lightning-progress-step>
                    <lightning-progress-step label="Awards" value="Awards"></lightning-progress-step>
                    <lightning-progress-step label="Review &amp; Save" value="Review &amp; Save"></lightning-progress-step>
                </lightning-progress-indicator>

                <!-- Step 1: Game + Team + Users -->
                <template if:true={isStep1}>
                    <div class="slds-grid slds-gutters slds-wrap slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input label="Game Name" value={gameName} data-field="gameName" onchange={handleField} required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <lightning-input type="text" label="Team Name" value={teamName} data-field="teamName" onchange={handleField} placeholder="e.g. Mayora Stars"></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input type="date" label="Start Date" value={startDate} data-field="startDate" onchange={handleField}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input type="date" label="End Date" value={endDate} data-field="endDate" onchange={handleField}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-p-top_large">
                            <lightning-input type="checkbox" label="Active" checked={isActive} data-field="isActive" onchange={handleField}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                            <lightning-dual-listbox name="users" label="Select Users for the Team"
                                source-label="Available Users" selected-label="In Team"
                                options={userOptions} value={selectedUserIds} onchange={handleUsers}
                                field-level-help="Search and move users into the team"></lightning-dual-listbox>
                        </div>
                    </div>
                </template>

                <!-- Step 2: KPIs -->
                <template if:true={isStep2}>
                    <div class="slds-m-top_medium">
                        <lightning-dual-listbox name="kpis" label="KPIs this game is focused on"
                            source-label="Available KPIs" selected-label="Game KPIs"
                            options={kpiOptions} value={selectedKpiIds} onchange={handleKpis}
                            field-level-help="Pick the KPIs (by category) the game rewards"></lightning-dual-listbox>
                    </div>
                </template>

                <!-- Step 3: Awards per KPI -->
                <template if:true={isStep3}>
                    <div class="slds-m-top_medium slds-scrollable_x">
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col"><div class="slds-truncate">KPI</div></th>
                                    <th scope="col"><div class="slds-truncate">Category</div></th>
                                    <th scope="col"><div class="slds-truncate">Target / Cutoff</div></th>
                                    <th scope="col"><div class="slds-truncate">Points (Coins)</div></th>
                                    <th scope="col"><div class="slds-truncate">Reward for the points</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={awardRows} for:item="row">
                                    <tr key={row.kpiId}>
                                        <td><div class="slds-truncate slds-p-top_x-small">{row.kpiName}</div></td>
                                        <td><div class="slds-truncate slds-p-top_x-small">{row.category}</div></td>
                                        <td><lightning-input variant="label-hidden" type="number" step="any" value={row.target} data-id={row.kpiId} data-field="target" onchange={handleAward}></lightning-input></td>
                                        <td><lightning-input variant="label-hidden" type="number" value={row.points} data-id={row.kpiId} data-field="points" onchange={handleAward}></lightning-input></td>
                                        <td><lightning-input variant="label-hidden" type="text" value={row.reward} data-id={row.kpiId} data-field="reward" placeholder="e.g. 500 voucher" onchange={handleAward}></lightning-input></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- Step 4: Review -->
                <template if:true={isStep4}>
                    <div class="slds-box slds-m-top_medium">
                        <dl class="slds-dl_horizontal">
                            <dt class="slds-dl_horizontal__label">Game</dt>
                            <dd class="slds-dl_horizontal__detail">{gameName}</dd>
                            <dt class="slds-dl_horizontal__label">Team</dt>
                            <dd class="slds-dl_horizontal__detail">{teamName}</dd>
                            <dt class="slds-dl_horizontal__label">Users selected</dt>
                            <dd class="slds-dl_horizontal__detail">{reviewSummary.users}</dd>
                            <dt class="slds-dl_horizontal__label">KPIs selected</dt>
                            <dd class="slds-dl_horizontal__detail">{reviewSummary.kpis}</dd>
                        </dl>
                        <p class="slds-text-color_weak">Click <strong>Save Game</strong> to create the game, team, KPIs and awards together.</p>
                    </div>
                </template>

                <!-- Wizard footer -->
                <div class="slds-m-top_medium slds-text-align_right">
                    <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
                    <template if:true={showBack}>
                        <lightning-button label="Back" onclick={handleBack} class="slds-m-right_x-small"></lightning-button>
                    </template>
                    <template if:false={isLastStep}>
                        <lightning-button label="Next" variant="brand" onclick={handleNext}></lightning-button>
                    </template>
                    <template if:true={isLastStep}>
                        <lightning-button label="Save Game" variant="brand" onclick={handleSave}></lightning-button>
                    </template>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
