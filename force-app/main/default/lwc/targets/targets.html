<template>
    <div class="dms-targets">
        <div class="dms-body">
            <div class="dms-kpis">
                <template for:each={kpis} for:item="kpi">
                    <c-dms-kpi-card key={kpi.id} label={kpi.label} value={kpi.value} variant={kpi.variant}></c-dms-kpi-card>
                </template>
            </div>

            <div class="dms-note">
                <strong>Targets vs Actual (BRD §13):</strong> targets are set by tier (P1 / P2 / Secondary / Outlet) and
                broken down by Product Hierarchy. Actuals roll up on a JC basis — P1 / P2 from invoices, Secondary from
                secondary orders. Outlet targets auto-increment each JC by a state &amp; outlet-type percentage.
            </div>

            <div class="dms-filters">
                <div class="dms-filter">
                    <span class="dms-filter__label">Tier:</span>
                    <lightning-combobox variant="label-hidden" value={tier} options={tierOptions} onchange={handleTier}></lightning-combobox>
                </div>
                <div class="dms-filter">
                    <span class="dms-filter__label">Brand:</span>
                    <lightning-combobox variant="label-hidden" value={brand} options={brandOptions} onchange={handleBrand}></lightning-combobox>
                </div>
                <div class="dms-filter dms-filter_search">
                    <lightning-input type="search" variant="label-hidden" placeholder="Search target owner or brand..." value={searchKey} onchange={handleSearch}></lightning-input>
                </div>
            </div>

            <div class="dms-tbl dms-tbl_targets">
                <div class="dms-thead">
                    <span>Tier</span><span>Target For</span><span>Product</span><span>KPI</span>
                    <span class="dms-num">Target</span><span class="dms-num">Actual</span>
                    <span>Achievement</span><span>Status</span>
                </div>
                <template for:each={filteredTargets} for:item="t">
                    <div key={t.key} class="dms-trow">
                        <span class="dms-strong" data-label="Tier">{t.tier}</span>
                        <span data-label="Target For">{t.entity}</span>
                        <span data-label="Product">{t.brand}</span>
                        <span class="dms-muted" data-label="KPI">{t.kpi}</span>
                        <span class="dms-num" data-label="Target">{t.targetLabel}</span>
                        <span class="dms-num dms-strong" data-label="Actual">{t.actualLabel}</span>
                        <span class="dms-coverage" data-label="Achievement">
                            <span class="dms-coverage__track">
                                <span class="dms-coverage__bar" style={t.barStyle}></span>
                            </span>
                            <span class="dms-coverage__pct">{t.pctLabel}</span>
                        </span>
                        <span data-label="Status">
                            <c-dms-status-badge label={t.status} theme={t.statusTheme}></c-dms-status-badge>
                        </span>
                    </div>
                </template>
            </div>
            <p class="dms-count">{targetCountLabel}</p>
        </div>
    </div>
</template>
