<template>
    <lightning-card title={pageTitle} icon-name="standard:promotions">
        <div class="slds-p-around_medium">

            <!-- Step Indicator -->
            <div class="step-indicator slds-m-bottom_medium">
                <template for:each={steps} for:item="step">
                    <div key={step.value} class="step-item" data-step={step.value} onclick={handleStepClick}>
                        <div class={step.circleClass}>{step.value}</div>
                        <span class={step.labelClass}>{step.label}</span>
                    </div>
                </template>
            </div>

            <!-- ═══════════ STEP 1: Basic Info ═══════════ -->
            <template if:true={isStep1}>
                <div class="step-content">
                    <h3 class="section-title">Scheme Information</h3>
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                label="Scheme Name" required
                                value={scheme.Name}
                                data-field="Name"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                label="Scheme Code" required
                                value={scheme.Scheme_Code__c}
                                data-field="Scheme_Code__c"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-combobox
                                label="Scheme Category" required
                                value={scheme.Scheme_Category__c}
                                options={categoryOptions}
                                data-field="Scheme_Category__c"
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-combobox
                                label="Scheme Type" required
                                value={scheme.Scheme_Type__c}
                                options={typeOptions}
                                data-field="Scheme_Type__c"
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                type="date" label="Start Date" required
                                value={scheme.Start_Date__c}
                                data-field="Start_Date__c"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                type="date" label="End Date" required
                                value={scheme.End_Date__c}
                                data-field="End_Date__c"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-combobox
                                label="Status" required
                                value={scheme.Status__c}
                                options={statusOptions}
                                data-field="Status__c"
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-combobox
                                label="Tier"
                                value={scheme.Tier__c}
                                options={tierOptions}
                                data-field="Tier__c"
                                onchange={handleFieldChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                type="number" label="Priority"
                                value={scheme.Priority__c}
                                data-field="Priority__c"
                                min="1"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                type="number" label="Budget Amount"
                                value={scheme.Budget_Amount__c}
                                data-field="Budget_Amount__c"
                                formatter="currency" step="0.01"
                                onchange={handleFieldChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                            <lightning-textarea
                                label="Description"
                                value={scheme.Description__c}
                                data-field="Description__c"
                                max-length="32768"
                                onchange={handleFieldChange}>
                            </lightning-textarea>
                        </div>
                    </div>

                    <h3 class="section-title slds-m-top_medium">Applicability</h3>
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-dual-listbox
                                label="Applicable Channels"
                                source-label="Available"
                                selected-label="Selected"
                                options={channelOptions}
                                value={scheme.Applicable_Channel__c}
                                data-field="Applicable_Channel__c"
                                onchange={handleFieldChange}>
                            </lightning-dual-listbox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-dual-listbox
                                label="Applicable Outlet Types"
                                source-label="Available"
                                selected-label="Selected"
                                options={outletTypeOptions}
                                value={scheme.Applicable_Outlet_Type__c}
                                data-field="Applicable_Outlet_Type__c"
                                onchange={handleFieldChange}>
                            </lightning-dual-listbox>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                            <lightning-input
                                type="checkbox" label="Is Stackable"
                                checked={scheme.Is_Stackable__c}
                                data-field="Is_Stackable__c"
                                onchange={handleCheckboxChange}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ═══════════ STEP 2: Benefit Config ═══════════ -->
            <template if:true={isStep2}>
                <div class="step-content">
                    <h3 class="section-title">Benefit Configuration</h3>
                    <div class="category-badge-display slds-m-bottom_medium">
                        <span class="slds-badge">{scheme.Scheme_Category__c}</span>
                        <span class="slds-badge slds-badge_inverse">{scheme.Scheme_Type__c}</span>
                    </div>

                    <!-- Free Products fields -->
                    <template if:true={isFreeProducts}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <div class="product-search-wrapper">
                                    <lightning-input
                                        label="Free Product"
                                        value={freeProductSearchTerm}
                                        placeholder="Search products..."
                                        onchange={handleFreeProductSearch}>
                                    </lightning-input>
                                    <template if:true={freeProductSearchResults.length}>
                                        <div class="search-results-dropdown">
                                            <template for:each={freeProductSearchResults} for:item="prod">
                                                <div key={prod.id} class="search-result-item"
                                                    data-id={prod.id} onclick={handleSelectFreeProduct}>
                                                    <span class="result-name">{prod.name}</span>
                                                    <span class="result-sku">{prod.sku}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Free Quantity"
                                    value={scheme.Free_Quantity__c}
                                    data-field="Free_Quantity__c"
                                    min="0"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Discount in % fields -->
                    <template if:true={isDiscountPercent}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Discount Percent"
                                    value={scheme.Discount_Percent__c}
                                    data-field="Discount_Percent__c"
                                    min="0" max="100" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Max Discount Cap"
                                    value={scheme.Max_Discount_Cap__c}
                                    data-field="Max_Discount_Cap__c"
                                    formatter="currency" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Discount in Value fields -->
                    <template if:true={isDiscountValue}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Price Discount (Flat Amount)"
                                    value={scheme.Price_Discount__c}
                                    data-field="Price_Discount__c"
                                    formatter="currency" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Max Discount Cap"
                                    value={scheme.Max_Discount_Cap__c}
                                    data-field="Max_Discount_Cap__c"
                                    formatter="currency" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Reward Points fields -->
                    <template if:true={isRewardPoints}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Reward Points"
                                    value={scheme.Reward_Points__c}
                                    data-field="Reward_Points__c"
                                    min="0"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <h3 class="section-title slds-m-top_large">Trigger Conditions</h3>

                    <!-- QTY-based trigger -->
                    <template if:true={showMinMaxQty}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Min Quantity"
                                    value={scheme.Min_Quantity__c}
                                    data-field="Min_Quantity__c"
                                    min="0"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Max Quantity"
                                    value={scheme.Max_Quantity__c}
                                    data-field="Max_Quantity__c"
                                    min="0"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- VAL-based trigger -->
                    <template if:true={showMOV}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Minimum Order Value (MOV)"
                                    value={scheme.MOV__c}
                                    data-field="MOV__c"
                                    formatter="currency" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Invoice Qty trigger -->
                    <template if:true={showInvoiceQtyFields}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Invoice Qty Threshold"
                                    value={scheme.Invoice_Qty_Threshold__c}
                                    data-field="Invoice_Qty_Threshold__c"
                                    min="0" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-combobox
                                    label="Invoice Qty UOM"
                                    value={scheme.Invoice_Qty_UOM__c}
                                    options={invoiceUomOptions}
                                    data-field="Invoice_Qty_UOM__c"
                                    onchange={handleFieldChange}>
                                </lightning-combobox>
                            </div>
                        </div>
                    </template>

                    <!-- Invoice Val trigger -->
                    <template if:true={showInvoiceValFields}>
                        <div class="slds-grid slds-gutters slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    type="number" label="Invoice Value Threshold"
                                    value={scheme.Invoice_Val_Threshold__c}
                                    data-field="Invoice_Val_Threshold__c"
                                    formatter="currency" step="0.01"
                                    onchange={handleFieldChange}>
                                </lightning-input>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ═══════════ STEP 3: Products ═══════════ -->
            <template if:true={isStep3}>
                <div class="step-content">
                    <h3 class="section-title">Scheme Products (Buy)</h3>
                    <div class="product-search-wrapper slds-m-bottom_medium">
                        <lightning-input
                            label="Search Products to Add"
                            value={productSearchTerm}
                            placeholder="Type product name or SKU..."
                            onchange={handleProductSearch}
                            class="search-input">
                        </lightning-input>
                        <template if:true={productSearchResults.length}>
                            <div class="search-results-dropdown">
                                <template for:each={productSearchResults} for:item="prod">
                                    <div key={prod.id} class="search-result-item"
                                        data-id={prod.id} onclick={handleSelectProduct}>
                                        <span class="result-name">{prod.name}</span>
                                        <span class="result-sku">{prod.sku} &bull; MRP: {prod.mrp}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <template if:true={hasBuyProducts}>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered child-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>SKU</th>
                                    <th>Min Qty</th>
                                    <th class="action-col"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={buyProducts} for:item="prod">
                                    <tr key={prod._key}>
                                        <td>{prod.productName}</td>
                                        <td>{prod.productSku}</td>
                                        <td>
                                            <lightning-input
                                                type="number" variant="label-hidden"
                                                value={prod.Min_Quantity__c}
                                                data-key={prod._key}
                                                min="0"
                                                onchange={handleProductMinQtyChange}>
                                            </lightning-input>
                                        </td>
                                        <td class="action-col">
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="bare" size="small"
                                                alternative-text="Remove"
                                                data-key={prod._key}
                                                onclick={handleRemoveProduct}>
                                            </lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                    <template if:false={hasBuyProducts}>
                        <div class="empty-child-state">No buy products added yet</div>
                    </template>

                    <!-- Get Products (for Free Products category) -->
                    <template if:true={isFreeProducts}>
                        <h3 class="section-title slds-m-top_large">Free/Get Products</h3>
                        <div class="product-search-wrapper slds-m-bottom_medium">
                            <lightning-input
                                label="Search Free Products to Add"
                                value={productSearchTerm}
                                placeholder="Type product name or SKU..."
                                onchange={handleProductSearch}>
                            </lightning-input>
                            <template if:true={productSearchResults.length}>
                                <div class="search-results-dropdown">
                                    <template for:each={productSearchResults} for:item="prod">
                                        <div key={prod.id} class="search-result-item"
                                            data-id={prod.id} onclick={handleSelectGetProduct}>
                                            <span class="result-name">{prod.name}</span>
                                            <span class="result-sku">{prod.sku}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <template if:true={hasGetProducts}>
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered child-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>SKU</th>
                                        <th class="action-col"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={getProducts} for:item="prod">
                                        <tr key={prod._key}>
                                            <td>{prod.productName}</td>
                                            <td>{prod.productSku}</td>
                                            <td class="action-col">
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    variant="bare" size="small"
                                                    alternative-text="Remove"
                                                    data-key={prod._key}
                                                    onclick={handleRemoveProduct}>
                                                </lightning-button-icon>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </template>
                    </template>
                </div>
            </template>

            <!-- ═══════════ STEP 4: Slabs ═══════════ -->
            <template if:true={isStep4}>
                <div class="step-content">
                    <div class="section-header">
                        <h3 class="section-title">Scheme Slabs</h3>
                        <lightning-button
                            label="Add Slab"
                            icon-name="utility:add"
                            variant="brand"
                            onclick={handleAddSlab}>
                        </lightning-button>
                    </div>

                    <template if:true={hasSlabs}>
                        <template for:each={schemeSlabs} for:item="slab">
                            <div key={slab._key} class="slab-card slds-m-bottom_small">
                                <div class="slab-card-header">
                                    <span class="slab-title">Slab</span>
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        variant="bare" size="small"
                                        alternative-text="Remove Slab"
                                        data-key={slab._key}
                                        onclick={handleRemoveSlab}>
                                    </lightning-button-icon>
                                </div>
                                <div class="slds-grid slds-gutters slds-wrap">
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-combobox
                                            label="Slab Type"
                                            value={slab.Slab_Type__c}
                                            options={slabTypeOptions}
                                            data-key={slab._key}
                                            data-field="Slab_Type__c"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Min Value/Qty"
                                            value={slab.Min_Value__c}
                                            data-key={slab._key}
                                            data-field="Min_Value__c"
                                            min="0" step="0.01"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Max Value/Qty"
                                            value={slab.Max_Value__c}
                                            data-key={slab._key}
                                            data-field="Max_Value__c"
                                            min="0" step="0.01"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-combobox
                                            label="Discount Type"
                                            value={slab.Discount_Type__c}
                                            options={discountTypeOptions}
                                            data-key={slab._key}
                                            data-field="Discount_Type__c"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Discount Value"
                                            value={slab.Discount_Value__c}
                                            data-key={slab._key}
                                            data-field="Discount_Value__c"
                                            min="0" step="0.01"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Free Qty"
                                            value={slab.Free_Quantity__c}
                                            data-key={slab._key}
                                            data-field="Free_Quantity__c"
                                            min="0"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Reward Points"
                                            value={slab.Reward_Points__c}
                                            data-key={slab._key}
                                            data-field="Reward_Points__c"
                                            min="0"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            type="number" label="Price Discount"
                                            value={slab.Price_Discount__c}
                                            data-key={slab._key}
                                            data-field="Price_Discount__c"
                                            formatter="currency" step="0.01"
                                            onchange={handleSlabFieldChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasSlabs}>
                        <div class="empty-child-state">
                            No slabs added. Slabs are optional — scheme-level benefit fields will be used when no slabs exist.
                        </div>
                    </template>
                </div>
            </template>

            <!-- ═══════════ STEP 5: Geo Mapping ═══════════ -->
            <template if:true={isStep5}>
                <div class="step-content">
                    <div class="section-header">
                        <h3 class="section-title">Geographic & Customer Mapping</h3>
                        <lightning-button
                            label="Add Mapping"
                            icon-name="utility:add"
                            variant="brand"
                            onclick={handleAddMapping}>
                        </lightning-button>
                    </div>

                    <template if:true={hasMappings}>
                        <template for:each={schemeMappings} for:item="mapping">
                            <div key={mapping._key} class="mapping-card slds-m-bottom_small">
                                <div class="slab-card-header">
                                    <span class="slab-title">Mapping</span>
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        variant="bare" size="small"
                                        alternative-text="Remove"
                                        data-key={mapping._key}
                                        onclick={handleRemoveMapping}>
                                    </lightning-button-icon>
                                </div>
                                <div class="slds-grid slds-gutters slds-wrap">
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            label="Zone"
                                            value={mapping.Zone__c}
                                            data-key={mapping._key}
                                            data-field="Zone__c"
                                            onchange={handleMappingFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            label="Area"
                                            value={mapping.Area__c}
                                            data-key={mapping._key}
                                            data-field="Area__c"
                                            onchange={handleMappingFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-combobox
                                            label="Customer Type"
                                            value={mapping.Customer_Type__c}
                                            options={customerTypeOptions}
                                            data-key={mapping._key}
                                            data-field="Customer_Type__c"
                                            onchange={handleMappingFieldChange}>
                                        </lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            label="District"
                                            value={mapping.District__c}
                                            data-key={mapping._key}
                                            data-field="District__c"
                                            onchange={handleMappingFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                        <lightning-input
                                            label="Sub Zone"
                                            value={mapping.Sub_Zone__c}
                                            data-key={mapping._key}
                                            data-field="Sub_Zone__c"
                                            onchange={handleMappingFieldChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasMappings}>
                        <div class="empty-child-state">
                            No mappings added. Without mappings, the scheme applies globally.
                        </div>
                    </template>
                </div>
            </template>

            <!-- ═══════════ Footer Buttons ═══════════ -->
            <div class="footer-actions slds-m-top_medium">
                <div class="slds-grid slds-grid_align-spread">
                    <div>
                        <lightning-button
                            label="Cancel"
                            onclick={handleCancel}>
                        </lightning-button>
                    </div>
                    <div>
                        <template if:false={isFirstStep}>
                            <lightning-button
                                label="Previous"
                                icon-name="utility:chevronleft"
                                class="slds-m-right_small"
                                onclick={handlePrevious}>
                            </lightning-button>
                        </template>
                        <template if:false={isLastStep}>
                            <lightning-button
                                label="Next"
                                variant="brand"
                                icon-name="utility:chevronright"
                                icon-position="right"
                                onclick={handleNext}>
                            </lightning-button>
                        </template>
                        <template if:true={isLastStep}>
                            <lightning-button
                                label="Save Scheme"
                                variant="brand"
                                icon-name="utility:save"
                                onclick={handleSave}>
                            </lightning-button>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </template>
        </div>
    </lightning-card>
</template>
