                                                field-level-help="Whether this slab is based on quantity or order value."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Min Value/Qty"
                                                value={slab.Min_Value__c}
                                                data-key={slab._key}
                                                data-field="Min_Value__c"
                                                min="0" step="0.01"
                                                field-level-help="Lower bound of this slab tier. Must not overlap with other slabs."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Max Value/Qty"
                                                value={slab.Max_Value__c}
                                                data-key={slab._key}
                                                data-field="Max_Value__c"
                                                min="0" step="0.01"
                                                field-level-help="Upper bound of this slab tier. Leave blank for the highest open-ended tier."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-combobox
                                                label="Discount Type"
                                                value={slab.Discount_Type__c}
                                                options={wizDiscountTypeOptions}
                                                data-key={slab._key}
                                                data-field="Discount_Type__c"
                                                field-level-help="Type of benefit for this slab: Percentage, Flat Amount, Free Quantity, or Reward Points."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-combobox>
                                        </div>
                                        <template if:true={slab.showDiscountValue}>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Discount Value"
                                                value={slab.Discount_Value__c}
                                                data-key={slab._key}
                                                data-field="Discount_Value__c"
                                                min="0" step="0.01"
                                                field-level-help="The discount amount or percentage for this slab."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        </template>
                                        <template if:true={slab.showFreeQty}>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Free Qty"
                                                value={slab.Free_Quantity__c}
                                                data-key={slab._key}
                                                data-field="Free_Quantity__c"
                                                min="0"
                                                field-level-help="Number of free product units for this slab."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        </template>
                                        <template if:true={slab.showRewardPoints}>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Reward Points"
                                                value={slab.Reward_Points__c}
                                                data-key={slab._key}
                                                data-field="Reward_Points__c"
                                                min="0"
                                                field-level-help="Loyalty points awarded for this slab."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        </template>
                                        <template if:true={slab.showPriceDiscount}>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                type="number" label="Price Discount"
                                                value={slab.Price_Discount__c}
                                                data-key={slab._key}
                                                data-field="Price_Discount__c"
                                                formatter="currency" step="0.01"
                                                field-level-help="Flat currency discount for this slab."
                                                onchange={handleWizSlabFieldChange}>
                                            </lightning-input>
                                        </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template if:false={wizHasSlabs}>
                            <div class="wiz-empty-child-state">
                                No slabs added. Slabs are optional — scheme-level benefit fields will be used when no slabs exist.
                            </div>
                        </template>
                    </div>
                </template>

                <!-- ═══════════ STEP 5: Geo Mapping ═══════════ -->
                <template if:true={wizIsStep5}>
                    <div class="wiz-step-content">
                        <div class="wiz-section-header">
                            <h3 class="wiz-section-title">Geographic & Customer Mapping</h3>
                            <lightning-button
                                label="Add Mapping"
                                icon-name="utility:add"
                                variant="brand"
                                onclick={handleWizAddMapping}>
                            </lightning-button>
                        </div>
                        <div class="wiz-step-guidance">
                            <lightning-icon icon-name="utility:info" size="xx-small" class="guidance-icon"></lightning-icon>
                            <span>Restrict this scheme to specific territories, regions, or customer types. If no mappings are added, the scheme will apply globally to all territories and customers.</span>
                        </div>

                        <template if:true={wizHasMappings}>
                            <template for:each={wizMappings} for:item="mapping">
                                <div key={mapping._key} class="wiz-mapping-card slds-m-bottom_small">
                                    <div class="wiz-slab-card-header">
                                        <span class="wiz-slab-title">Mapping</span>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare" size="small"
                                            alternative-text="Remove"
                                            data-key={mapping._key}
                                            onclick={handleWizRemoveMapping}>
                                        </lightning-button-icon>
                                    </div>
                                    <div class="slds-grid slds-gutters slds-wrap">
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="wiz-product-search-wrapper">
                                                <lightning-input
                                                    label="Territory"
                                                    value={mapping.territoryName}
                                                    placeholder="Search territory by name or code..."
                                                    data-key={mapping._key}
                                                    field-level-help="Search and select a territory. Zone, Area, and District will auto-populate from the territory data."
                                                    onchange={handleWizTerritorySearch}>
                                                </lightning-input>
                                                <template if:true={wizTerritorySearchResults.length}>
                                                    <div class="wiz-search-results-dropdown">
                                                        <template for:each={wizTerritorySearchResults} for:item="terr">
                                                            <div key={terr.id} class="wiz-search-result-item"
                                                                data-id={terr.id} onclick={handleWizSelectTerritory}>
                                                                <div class="wiz-result-text">
                                                                    <span class="wiz-result-name">{terr.name}</span>
                                                                    <span class="wiz-result-sku">{terr.code} &bull; {terr.region} &bull; {terr.state}</span>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <lightning-combobox
                                                label="Customer Type"
                                                value={mapping.Customer_Type__c}
                                                options={wizCustomerTypeOptions}
                                                data-key={mapping._key}
                                                data-field="Customer_Type__c"
                                                field-level-help="Filter this mapping to a specific customer type, or leave as 'All' to include every customer in the territory."
                                                onchange={handleWizMappingFieldChange}>
                                            </lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                label="Zone / Region"
                                                value={mapping.Zone__c}
                                                data-key={mapping._key}
                                                data-field="Zone__c"
                                                field-level-help="Auto-filled from territory. You can override to target a broader region."
                                                onchange={handleWizMappingFieldChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                label="Area / State"
                                                value={mapping.Area__c}
                                                data-key={mapping._key}
                                                data-field="Area__c"
                                                field-level-help="Auto-filled from territory. You can override to target a specific state or area."
                                                onchange={handleWizMappingFieldChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                label="District / City"
                                                value={mapping.District__c}
                                                data-key={mapping._key}
                                                data-field="District__c"
                                                field-level-help="Auto-filled from territory. You can override to target a specific district or city."
                                                onchange={handleWizMappingFieldChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3 slds-p-bottom_small">
                                            <lightning-input
                                                label="Sub Zone"
                                                value={mapping.Sub_Zone__c}
                                                data-key={mapping._key}
                                                data-field="Sub_Zone__c"
                                                field-level-help="Optional sub-zone for more granular geographic targeting within a territory."
                                                onchange={handleWizMappingFieldChange}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template if:false={wizHasMappings}>
                            <div class="wiz-empty-child-state">
                                No mappings added. Without mappings, the scheme applies globally.
                            </div>
                        </template>
                    </div>
                </template>

                <!-- ═══════════ Wizard Footer Buttons ═══════════ -->
                <div class="wiz-footer-actions slds-m-top_medium">
                    <div class="slds-grid slds-grid_align-spread">
                        <div>
                            <lightning-button
                                label="Cancel"
                                onclick={handleWizCancel}>
                            </lightning-button>
                        </div>
                        <div>
                            <template if:false={wizIsFirstStep}>
                                <lightning-button
                                    label="Previous"
                                    icon-name="utility:chevronleft"
                                    class="slds-m-right_small"
                                    onclick={handleWizPrevious}>
                                </lightning-button>
                            </template>
                            <template if:false={wizIsLastStep}>
                                <lightning-button
                                    label="Next"
                                    variant="brand"
                                    icon-name="utility:chevronright"
                                    icon-position="right"
                                    onclick={handleWizNext}>
                                </lightning-button>
                            </template>
                            <template if:true={wizIsLastStep}>
                                <lightning-button
                                    label="Save Scheme"
                                    variant="brand"
                                    icon-name="utility:save"
                                    onclick={handleWizSave}>
                                </lightning-button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- ═══════════ DELETE CONFIRM MODAL ═══════════ -->
        <template if:true={showDeleteConfirm}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <div class="slds-modal__header">
                        <h2 class="slds-modal__title">Confirm Delete</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Are you sure you want to delete this scheme? This will also delete all associated products, slabs, and mappings. This action cannot be undone.</p>
                    </div>
                    <div class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCancelDelete}></lightning-button>
                        <lightning-button label="Delete" variant="destructive" onclick={handleConfirmDelete}
                            class="slds-m-left_x-small"></lightning-button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- ═══════════ STATUS CHANGE MODAL ═══════════ -->
        <template if:true={showStatusModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <div class="slds-modal__header">
                        <h2 class="slds-modal__title">Confirm Status Change</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{statusChangeMessage}</p>
                    </div>
                    <div class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCancelStatusChange}></lightning-button>
                        <lightning-button label="Confirm" variant="brand" onclick={handleConfirmStatusChange}
                            class="slds-m-left_x-small"></lightning-button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>
    </div>
</template>
