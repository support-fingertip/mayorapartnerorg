<template>
    <div class="dms-home">
        <!-- Dashboard sub-tabs -->
        <div class="dms-subtabs" role="tablist">
            <template for:each={subTabs} for:item="tab">
                <button
                    key={tab.id}
                    class={tab.class}
                    data-dash={tab.id}
                    onclick={handleDashTab}
                    type="button"
                >
                    {tab.label}
                </button>
            </template>
        </div>

        <div class="dms-body">
            <!-- Period selector -->
            <div class="dms-period">
                <span class="dms-period__label">Period:</span>
                <lightning-combobox
                    class="dms-period__select"
                    variant="label-hidden"
                    value={period}
                    options={periodOptions}
                    onchange={handlePeriod}
                ></lightning-combobox>
            </div>

            <!-- ============================ P1 ============================ -->
            <template lwc:if={isP1}>
                <div class="dms-kpis">
                    <template for:each={p1Kpis} for:item="kpi">
                        <c-dms-kpi-card
                            key={kpi.id}
                            label={kpi.label}
                            value={kpi.value}
                            variant={kpi.variant}
                        ></c-dms-kpi-card>
                    </template>
                </div>

                <!-- Order Analysis -->
                <section class="dms-panel">
                    <div class="dms-panel__head">
                        <h2 class="dms-panel__title">Order Analysis</h2>
                        <div class="dms-toggle">
                            <template for:each={orderDimButtons} for:item="btn">
                                <button
                                    key={btn.dim}
                                    class={btn.class}
                                    data-dim={btn.dim}
                                    onclick={handleOrderDim}
                                    type="button"
                                >
                                    {btn.label}
                                </button>
                            </template>
                        </div>
                    </div>
                    <div class="slds-grid slds-wrap dms-charts">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 dms-charts__col">
                            <c-dms-bar-chart
                                title="No. of Orders"
                                scheme="blue"
                                max={ordersMax}
                                ticks={ordersTicks}
                                items={ordersChartItems}
                            ></c-dms-bar-chart>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 dms-charts__col">
                            <c-dms-bar-chart
                                title="Order Value (₹ L)"
                                scheme="green"
                                max={valueMax}
                                ticks={valueTicks}
                                items={valueChartItems}
                            ></c-dms-bar-chart>
                        </div>
                    </div>
                </section>

                <!-- SKU-wise Return Qty -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">SKU-wise Return Qty</h2>
                    <div class="dms-tbl dms-tbl_sku">
                        <div class="dms-thead">
                            <span>SKU Code</span><span>SKU Name</span><span class="dms-num">Return Qty</span>
                        </div>
                        <template for:each={skuReturns} for:item="row">
                            <div key={row.key} class="dms-trow">
                                <span class="dms-strong" data-label="SKU Code">{row.code}</span>
                                <span data-label="SKU Name">{row.name}</span>
                                <span class="dms-num" data-label="Return Qty">{row.qty}</span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Scheme-wise Claims -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Scheme-wise Claims</h2>
                    <div class="dms-tbl dms-tbl_scheme">
                        <div class="dms-thead">
                            <span>Scheme Name</span><span class="dms-num">Claim Value</span><span>Status</span>
                        </div>
                        <template for:each={schemeClaims} for:item="row">
                            <div key={row.key} class="dms-trow">
                                <span class="dms-strong" data-label="Scheme Name">{row.name}</span>
                                <span class="dms-num" data-label="Claim Value">{row.value}</span>
                                <span data-label="Status">
                                    <c-dms-status-badge status={row.status}></c-dms-status-badge>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- ============================ P2 ============================ -->
            <template lwc:if={isP2}>
                <div class="dms-kpis">
                    <template for:each={p2Kpis} for:item="kpi">
                        <c-dms-kpi-card
                            key={kpi.id}
                            label={kpi.label}
                            value={kpi.value}
                            variant={kpi.variant}
                        ></c-dms-kpi-card>
                    </template>
                </div>

                <!-- Top 5 SDs -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Top 5 SDs by Sales Value (₹ L)</h2>
                    <c-dms-bar-chart
                        scheme="purple"
                        max={valueMax}
                        ticks={valueTicks}
                        items={topSDs}
                    ></c-dms-bar-chart>
                </section>

                <!-- All SDs -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">All SDs</h2>
                    <div class="dms-tbl dms-tbl_sd">
                        <div class="dms-thead">
                            <span>SD Name</span><span class="dms-num">Orders</span>
                            <span class="dms-num">Invoices</span><span class="dms-num">Returns</span>
                            <span class="dms-num">Order Value</span><span class="dms-num">Invoice Value</span>
                            <span class="dms-num">Return Value</span>
                        </div>
                        <template for:each={allSDs} for:item="sd">
                            <div key={sd.key} class={sd.rowClass}>
                                <span class="dms-strong" data-label="SD Name">
                                    {sd.name}
                                    <template lwc:if={sd.noSales}>
                                        <c-dms-status-badge status="No Sales"></c-dms-status-badge>
                                    </template>
                                </span>
                                <span class="dms-num" data-label="Orders">{sd.orders}</span>
                                <span class="dms-num" data-label="Invoices">{sd.invoices}</span>
                                <span class="dms-num" data-label="Returns">{sd.returns}</span>
                                <span class="dms-num" data-label="Order Value">{sd.ov}</span>
                                <span class="dms-num" data-label="Invoice Value">{sd.iv}</span>
                                <span class="dms-num" data-label="Return Value">{sd.rv}</span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Range Selling -->
                <section class="dms-panel">
                    <div class="dms-panel__head">
                        <h2 class="dms-panel__title">Range Selling</h2>
                        <div class="dms-toggle">
                            <template for:each={rangeDimButtons} for:item="btn">
                                <button
                                    key={btn.dim}
                                    class={btn.class}
                                    data-dim={btn.dim}
                                    onclick={handleRangeDim}
                                    type="button"
                                >
                                    {btn.label}
                                </button>
                            </template>
                        </div>
                    </div>
                    <div class="dms-tbl dms-tbl_range">
                        <div class="dms-thead">
                            <span>Name</span><span>Outlets Covered</span><span>Coverage %</span>
                        </div>
                        <template for:each={rangeRows} for:item="row">
                            <div key={row.key} class="dms-trow">
                                <span class="dms-strong" data-label="Name">{row.name}</span>
                                <span data-label="Outlets Covered">{row.covered}</span>
                                <span class="dms-coverage" data-label="Coverage %">
                                    <span class="dms-coverage__track">
                                        <span class="dms-coverage__bar" style={row.barStyle}></span>
                                    </span>
                                    <span class="dms-coverage__pct">{row.pctLabel}</span>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Tickets -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Tickets</h2>
                    <div class="dms-tbl dms-tbl_tickets">
                        <div class="dms-thead">
                            <span>Ticket ID</span><span>Subject</span>
                            <span>Priority</span><span>Status</span>
                        </div>
                        <template for:each={p2Tickets} for:item="t">
                            <div key={t.id} class="dms-trow">
                                <span class="dms-link" data-label="Ticket ID">{t.id}</span>
                                <span data-label="Subject">{t.subject}</span>
                                <span data-label="Priority">
                                    <c-dms-status-badge label={t.priority} theme={t.priorityTheme}></c-dms-status-badge>
                                </span>
                                <span data-label="Status">
                                    <c-dms-status-badge label={t.status} theme={t.statusTheme}></c-dms-status-badge>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>
            </template>

            <!-- ======================== Secondary ======================== -->
            <template lwc:if={isSecondary}>
                <div class="dms-kpis">
                    <template for:each={secondaryKpisTop} for:item="kpi">
                        <c-dms-kpi-card
                            key={kpi.id}
                            label={kpi.label}
                            value={kpi.value}
                            variant={kpi.variant}
                        ></c-dms-kpi-card>
                    </template>
                </div>
                <div class="dms-kpis">
                    <template for:each={secondaryKpisMain} for:item="kpi">
                        <c-dms-kpi-card
                            key={kpi.id}
                            label={kpi.label}
                            value={kpi.value}
                            variant={kpi.variant}
                        ></c-dms-kpi-card>
                    </template>
                </div>

                <!-- Beat-wise + Outlet Type -->
                <div class="dms-two">
                    <section class="dms-panel">
                        <h2 class="dms-panel__title">Beat-wise Sales Value (₹ L)</h2>
                        <c-dms-column-chart
                            scheme="blue"
                            max={beatMax}
                            ticks={beatTicks}
                            items={beatSales}
                        ></c-dms-column-chart>
                    </section>
                    <section class="dms-panel">
                        <h2 class="dms-panel__title">Outlet Type Distribution</h2>
                        <c-dms-pie-chart items={outletTypes}></c-dms-pie-chart>
                    </section>
                </div>

                <!-- Top 5 Customers -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Top 5 Customers by Sales Value (₹ L)</h2>
                    <c-dms-bar-chart
                        scheme="blue"
                        max={customerMax}
                        ticks={customerTicks}
                        items={topCustomers}
                    ></c-dms-bar-chart>
                </section>

                <!-- Range Selling -->
                <section class="dms-panel">
                    <div class="dms-panel__head">
                        <h2 class="dms-panel__title">Range Selling</h2>
                        <div class="dms-toggle">
                            <template for:each={rangeDimButtons} for:item="btn">
                                <button
                                    key={btn.dim}
                                    class={btn.class}
                                    data-dim={btn.dim}
                                    onclick={handleRangeDim}
                                    type="button"
                                >
                                    {btn.label}
                                </button>
                            </template>
                        </div>
                    </div>
                    <div class="dms-tbl dms-tbl_range">
                        <div class="dms-thead">
                            <span>Name</span><span>Outlets Covered</span><span>Coverage %</span>
                        </div>
                        <template for:each={rangeRows} for:item="row">
                            <div key={row.key} class="dms-trow">
                                <span class="dms-strong" data-label="Name">{row.name}</span>
                                <span data-label="Outlets Covered">{row.covered}</span>
                                <span class="dms-coverage" data-label="Coverage %">
                                    <span class="dms-coverage__track">
                                        <span class="dms-coverage__bar" style={row.barStyle}></span>
                                    </span>
                                    <span class="dms-coverage__pct">{row.pctLabel}</span>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Secondary Collection -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Secondary Collection</h2>
                    <div class="dms-tbl dms-tbl_collection">
                        <div class="dms-thead">
                            <span>Customer</span><span>Invoice No.</span><span class="dms-num">Invoice Amt</span>
                            <span class="dms-num">Collected</span><span>Status</span>
                        </div>
                        <template for:each={secondaryCollection} for:item="c">
                            <div key={c.key} class="dms-trow">
                                <span class="dms-strong" data-label="Customer">{c.customer}</span>
                                <span class="dms-link" data-label="Invoice No.">{c.inv}</span>
                                <span class="dms-num" data-label="Invoice Amt">{c.amt}</span>
                                <span class="dms-num" data-label="Collected">{c.collected}</span>
                                <span data-label="Status">
                                    <c-dms-status-badge label={c.status} theme={c.statusTheme}></c-dms-status-badge>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- New Outlets -->
                <section class="dms-panel">
                    <div class="dms-panel__head">
                        <h2 class="dms-panel__title">New Outlets</h2>
                        <span class="dms-meta">{newOutletsLabel}</span>
                    </div>
                    <div class="dms-tbl dms-tbl_outlets">
                        <div class="dms-thead">
                            <span>Outlet Name</span><span>Beat</span><span>Type</span><span>Date Added</span>
                        </div>
                        <template for:each={newOutlets} for:item="o">
                            <div key={o.key} class="dms-trow">
                                <span class="dms-strong" data-label="Outlet Name">{o.name}</span>
                                <span data-label="Beat">{o.beat}</span>
                                <span data-label="Type">{o.type}</span>
                                <span data-label="Date Added">{o.date}</span>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- Tickets -->
                <section class="dms-panel">
                    <h2 class="dms-panel__title">Tickets</h2>
                    <div class="dms-tbl dms-tbl_tickets">
                        <div class="dms-thead">
                            <span>Ticket ID</span><span>Subject</span>
                            <span>Priority</span><span>Status</span>
                        </div>
                        <template for:each={secondaryTickets} for:item="t">
                            <div key={t.id} class="dms-trow">
                                <span class="dms-link" data-label="Ticket ID">{t.id}</span>
                                <span data-label="Subject">{t.subject}</span>
                                <span data-label="Priority">
                                    <c-dms-status-badge label={t.priority} theme={t.priorityTheme}></c-dms-status-badge>
                                </span>
                                <span data-label="Status">
                                    <c-dms-status-badge label={t.status} theme={t.statusTheme}></c-dms-status-badge>
                                </span>
                            </div>
                        </template>
                    </div>
                </section>
            </template>
        </div>
    </div>
</template>
