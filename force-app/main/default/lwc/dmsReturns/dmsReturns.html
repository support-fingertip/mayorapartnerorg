<template>
    <div class="dms-returns">
        <!-- Sub-tabs -->
        <div class="dms-subtabs" role="tablist">
            <template for:each={subTabs} for:item="tab">
                <button key={tab.id} class={tab.class} data-tab={tab.id} onclick={handleTab} type="button">
                    {tab.label}
                </button>
            </template>
        </div>

        <div class="dms-body">
            <div class="dms-toolbar">
                <div class="dms-filter">
                    <span class="dms-filter__label">List:</span>
                    <lightning-combobox variant="label-hidden" value={statusFilter} options={statusOptions} onchange={handleStatus}></lightning-combobox>
                </div>
                <template lwc:if={isP1}>
                    <button class="dms-btn" type="button" onclick={openWizard}>
                        <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        New Return
                    </button>
                </template>
                <template lwc:else>
                    <span class="dms-viewonly">View only</span>
                </template>
            </div>

            <!-- ----------------------------- P1 ----------------------------- -->
            <template lwc:if={isP1}>
                <div class="dms-cards">
                    <template for:each={p1Summary} for:item="c">
                        <div key={c.id} class="dms-card"><span class="dms-card__label">{c.label}</span><span class={c.cls}>{c.value}</span></div>
                    </template>
                </div>
                <div class="dms-tbl dms-tbl_pr">
                    <div class="dms-thead">
                        <span>Return ID</span><span>Date</span><span class="dms-num">Qty (Units)</span><span>Status</span><span>Action</span>
                    </div>
                    <template for:each={p1Rows} for:item="r">
                        <div key={r.key} class="dms-trow">
                            <span class="dms-link" data-label="Return ID">{r.id}</span>
                            <span data-label="Date">{r.date}</span>
                            <span class="dms-num" data-label="Qty (Units)">{r.qty}</span>
                            <span data-label="Status"><c-dms-status-badge label={r.status} theme={r.statusTheme}></c-dms-status-badge></span>
                            <span class="dms-link" data-label="Action" data-id={r.id} onclick={viewReturn}>View</span>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ----------------------------- P2 ----------------------------- -->
            <template lwc:if={isP2}>
                <div class="dms-cards">
                    <template for:each={p2Summary} for:item="c">
                        <div key={c.id} class="dms-card"><span class="dms-card__label">{c.label}</span><span class={c.cls}>{c.value}</span></div>
                    </template>
                </div>
                <div class="dms-tbl dms-tbl_pr">
                    <div class="dms-thead">
                        <span>Return ID</span><span>Date</span><span class="dms-num">Qty (Units)</span><span>Status</span><span>Action</span>
                    </div>
                    <template for:each={p2Rows} for:item="r">
                        <div key={r.key} class="dms-trow">
                            <span class="dms-link" data-label="Return ID">{r.id}</span>
                            <span data-label="Date">{r.date}</span>
                            <span class="dms-num" data-label="Qty (Units)">{r.qty}</span>
                            <span data-label="Status"><c-dms-status-badge label={r.status} theme={r.statusTheme}></c-dms-status-badge></span>
                            <span class="dms-link" data-label="Action" data-id={r.id} onclick={viewReturn}>View</span>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ------------------------- Secondary -------------------------- -->
            <template lwc:if={isSecondary}>
                <div class="dms-cards">
                    <template for:each={secondarySummary} for:item="c">
                        <div key={c.id} class="dms-card"><span class="dms-card__label">{c.label}</span><span class={c.cls}>{c.value}</span></div>
                    </template>
                </div>
                <div class="dms-tbl dms-tbl_sr">
                    <div class="dms-thead">
                        <span>Return ID</span><span>Date</span><span>Customer</span><span>Type</span>
                        <span class="dms-num">Qty (Units)</span><span>Status</span><span>Action</span>
                    </div>
                    <template for:each={secondaryRows} for:item="r">
                        <div key={r.key} class="dms-trow">
                            <span class="dms-link" data-label="Return ID">{r.id}</span>
                            <span data-label="Date">{r.date}</span>
                            <span class="dms-strong" data-label="Customer">{r.customer}</span>
                            <span data-label="Type"><c-dms-status-badge label={r.type} theme={r.typeTheme}></c-dms-status-badge></span>
                            <span class="dms-num" data-label="Qty (Units)">{r.qty}</span>
                            <span data-label="Status"><c-dms-status-badge label={r.status} theme={r.statusTheme}></c-dms-status-badge></span>
                            <span class="dms-link" data-label="Action" data-id={r.id} onclick={viewReturn}>View</span>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ===================== Create Primary Return ===================== -->
        <template lwc:if={wizardOpen}>
            <div class="dms-modal__overlay" onclick={closeWizard}></div>
            <div class="dms-wizard" role="dialog">
                <header class="dms-wizard__head">
                    <div class="dms-wizard__title">
                        <h2>Create Primary Return</h2>
                        <div class="dms-steps">
                            <template for:each={stepDots} for:item="d">
                                <span key={d.n} class={d.class}>{d.n}</span>
                            </template>
                            <span class="dms-steps__label">{stepLabel}</span>
                        </div>
                    </div>
                    <button class="dms-iconbtn" type="button" onclick={closeWizard} title="Close">
                        <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </header>

                <div class="dms-wizard__body">
                    <template lwc:if={isStep1}>
                        <div class="dms-note">Primary Return — goods returned to <strong>Mayora India Ltd.</strong> against a received SAP invoice.</div>
                        <p class="dms-wizard__label">Select Invoice (GRN Done)</p>
                        <div class="dms-picklist">
                            <template for:each={invoiceCards} for:item="inv">
                                <button key={inv.key} class={inv.rowClass} data-id={inv.id} onclick={selectInvoice} type="button">
                                    <span class={inv.radioClass}></span>
                                    <span class="dms-pick__main">
                                        <span class="dms-pick__top">
                                            <span class="dms-pick__id">{inv.id}</span>
                                            <span class="dms-pick__tag">SAP Invoice</span>
                                        </span>
                                        <span class="dms-pick__meta">{inv.metaLabel}</span>
                                        <span class="dms-pick__prods">{inv.productsLabel}</span>
                                    </span>
                                </button>
                            </template>
                        </div>
                    </template>

                    <template lwc:if={isStep2}>
                        <p class="dms-wizard__hint">Enter return quantity (in cartons) and reason for each product.</p>
                        <div class="dms-tbl dms-tbl_items">
                            <div class="dms-thead">
                                <span>Product</span><span class="dms-num">Delivered Qty</span>
                                <span>Return Qty (Cartons)</span><span>Reason</span>
                            </div>
                            <template for:each={itemRows} for:item="it">
                                <div key={it.id} class="dms-trow">
                                    <span class="dms-strong" data-label="Product">{it.name}</span>
                                    <span class="dms-num" data-label="Delivered Qty">{it.delivered}</span>
                                    <span data-label="Return Qty (Cartons)">
                                        <input class="dms-qtyinput" type="number" min="0" max={it.delivered} value={it.returnQty} data-id={it.id} onchange={handleReturnQty} />
                                    </span>
                                    <span data-label="Reason">
                                        <lightning-combobox variant="label-hidden" value={it.reason} options={reasonOptions} data-id={it.id} onchange={handleReason}></lightning-combobox>
                                    </span>
                                </div>
                            </template>
                        </div>
                        <div class="dms-rtotal">
                            <span class="dms-rtotal__label">Total Return Qty</span>
                            <span class="dms-rtotal__value">{totalReturnQty} cartons</span>
                        </div>
                    </template>
                </div>

                <footer class="dms-wizard__foot">
                    <button class="dms-btn dms-btn_outline" type="button" onclick={backStep}>
                        ‹ <template lwc:if={isStep1}>Cancel</template><template lwc:else>Back</template>
                    </button>
                    <button class="dms-btn" type="button" onclick={nextStep} disabled={nextDisabled}>
                        <template lwc:if={isStep2}>Save Return</template>
                        <template lwc:else>Next ›</template>
                    </button>
                </footer>
            </div>
        </template>

        <!-- ===================== Return detail modal ===================== -->
        <template lwc:if={detailOpen}>
            <div class="dms-modal__overlay" onclick={closeDetail}></div>
            <div class="dms-detail" role="dialog">
                <header class="dms-detail__head">
                    <div>
                        <h2>{selected.id}</h2>
                        <p>{selected.subtitle}</p>
                    </div>
                    <div class="dms-detail__headright">
                        <c-dms-status-badge label={selected.status} theme={selected.statusTheme}></c-dms-status-badge>
                        <button class="dms-iconbtn" type="button" onclick={closeDetail} title="Close">
                            <svg class="dms-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </header>
                <div class="dms-detail__body">
                    <div class="dms-tbl dms-tbl_rdetail">
                        <div class="dms-thead">
                            <span>Product</span><span class="dms-num">Return Qty (Units)</span><span>Reason</span>
                        </div>
                        <template for:each={selected.lines} for:item="l">
                            <div key={l.key} class="dms-trow">
                                <span class="dms-strong" data-label="Product">{l.product}</span>
                                <span class="dms-num dms-link" data-label="Return Qty (Units)">{l.qty}</span>
                                <span class="dms-reason" data-label="Reason">{l.reason}</span>
                            </div>
                        </template>
                    </div>
                </div>
                <footer class="dms-detail__foot">
                    <span class="dms-detail__total">Total: <strong>{selected.totalLabel}</strong></span>
                    <button class="dms-btn dms-btn_outline" type="button" onclick={closeDetail}>Close</button>
                </footer>
            </div>
        </template>
    </div>
</template>
