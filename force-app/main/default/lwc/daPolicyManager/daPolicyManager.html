<template>
    <c-bulk-entry-grid title="DA Policies — bulk entry" columns={parentColumns} records={parentRows} onsave={handleSaveParents}></c-bulk-entry-grid>

    <div class="slds-box slds-theme_shade slds-m-vertical_small">
        <lightning-combobox label="Manage KPI Targets for DA Policy"
            placeholder="Select a DA Policy" options={parentOptions}
            value={selectedParentId} onchange={handleParentSelect}></lightning-combobox>
    </div>

    <template if:true={hasParentSelected}>
        <c-bulk-entry-grid title="DA KPI Targets — bulk entry" columns={childColumns} records={childRows} onsave={handleSaveChildren}></c-bulk-entry-grid>
    </template>
</template>
