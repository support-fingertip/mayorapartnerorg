<template>
    <c-bulk-entry-grid title="MAP Budgets — bulk entry" columns={parentColumns} records={parentRows} onsave={handleSaveParents}></c-bulk-entry-grid>

    <div class="slds-box slds-theme_shade slds-m-vertical_small">
        <lightning-combobox label="Manage MAP Orders for MAP Budget"
            placeholder="Select a MAP Budget" options={parentOptions}
            value={selectedParentId} onchange={handleParentSelect}></lightning-combobox>
    </div>

    <template if:true={hasParentSelected}>
        <c-bulk-entry-grid title="MAP Orders — bulk entry" columns={childColumns} records={childRows} onsave={handleSaveChildren}></c-bulk-entry-grid>
    </template>
</template>
