<template>
    <lightning-card title="MAP — Budgets & Orders" icon-name="standard:campaign">
        <lightning-button slot="actions" label="New MAP Budget" variant="brand" onclick={handleNewParent}></lightning-button>
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <lightning-datatable key-field="Id" data={parents} columns={parentColumns}
                onrowaction={handleParentRowAction} hide-checkbox-column></lightning-datatable>
        </div>
    </lightning-card>

    <template if:true={hasSelection}>
        <lightning-card title={childPanelTitle} icon-name="standard:related_list" class="slds-m-top_small">
            <lightning-button slot="actions" label="Add MAP Order" variant="neutral" onclick={handleNewChild}></lightning-button>
            <div class="slds-p-horizontal_small slds-p-bottom_small">
                <lightning-datatable key-field="Id" data={children} columns={childColumns} hide-checkbox-column></lightning-datatable>
            </div>
        </lightning-card>
    </template>

    <template if:true={showParentForm}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeParentForm}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">{parentFormTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-form object-api-name={parentObject} record-id={recordId}
                        fields={parentFields} columns="2" mode="edit"
                        onsuccess={handleParentSuccess} oncancel={closeParentForm}></lightning-record-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showChildForm}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeChildForm}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">New MAP Order</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form object-api-name={childObject} onsuccess={handleChildSuccess}>
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name={childParentField} value={selectedId}></lightning-input-field>
                        <lightning-input-field field-name="Amount__c"></lightning-input-field>
            <lightning-input-field field-name="Actuals__c"></lightning-input-field>
            <lightning-input-field field-name="Description__c"></lightning-input-field>
            <lightning-input-field field-name="Status__c"></lightning-input-field>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancel" onclick={closeChildForm} class="slds-m-right_x-small"></lightning-button>
                            <lightning-button label="Save" type="submit" variant="brand"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
