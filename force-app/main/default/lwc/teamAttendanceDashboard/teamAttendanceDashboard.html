<template>
    <!-- ═══════════════════════════════════════════════════════════════════
         TEAM ATTENDANCE DASHBOARD - Manager View
         ═══════════════════════════════════════════════════════════════════ -->

    <lightning-card title="Team Attendance Dashboard" icon-name="standard:employee_organization">

        <!-- ── HEADER TOOLBAR ─────────────────────────────────────────── -->
        <div slot="actions" class="header-actions">
            <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                <!-- View Mode Toggle -->
                <div class="slds-col">
                    <lightning-button-group>
                        <lightning-button
                            label="Daily"
                            variant={dailyButtonVariant}
                            onclick={handleDailyView}
                        ></lightning-button>
                        <lightning-button
                            label="Weekly Summary"
                            variant={weeklyButtonVariant}
                            onclick={handleWeeklyView}
                        ></lightning-button>
                    </lightning-button-group>
                </div>

                <!-- Date Picker -->
                <div class="slds-col">
                    <lightning-input
                        type="date"
                        label="Attendance Date"
                        value={selectedDate}
                        onchange={handleDateChange}
                        variant="label-hidden"
                        class="date-picker"
                    ></lightning-input>
                </div>

                <!-- End Date (Weekly mode only) -->
                <template if:true={isWeeklyView}>
                    <div class="slds-col">
                        <lightning-input
                            type="date"
                            label="End Date"
                            value={selectedEndDate}
                            onchange={handleEndDateChange}
                            variant="label-hidden"
                            class="date-picker"
                        ></lightning-input>
                    </div>
                </template>

                <!-- Refresh Button -->
                <div class="slds-col">
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        onclick={handleRefresh}
                        class="refresh-btn"
                    ></lightning-button-icon>
                </div>
            </div>
        </div>

        <!-- ── LOADING SPINNER ────────────────────────────────────────── -->
        <template if:true={isLoading}>
            <div class="slds-is-relative spinner-container">
                <lightning-spinner alternative-text="Loading attendance data" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ── MAIN CONTENT ───────────────────────────────────────────── -->
        <template if:false={isLoading}>

            <!-- ── DAILY VIEW ─────────────────────────────────────────── -->
            <template if:false={isWeeklyView}>

                <!-- SUMMARY CARDS ROW -->
                <div class="slds-grid slds-wrap slds-gutters_small slds-p-around_medium summary-cards-container">

                    <!-- Present Card -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                        <div class="summary-card summary-card-present">
                            <div class="summary-card-inner">
                                <div class="summary-card-icon">
                                    <lightning-icon icon-name="utility:check" size="medium" alternative-text="Present"></lightning-icon>
                                </div>
                                <div class="summary-card-content">
                                    <p class="summary-card-value">{presentCount}</p>
                                    <p class="summary-card-label">Present</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- On Leave Card -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                        <div class="summary-card summary-card-leave">
                            <div class="summary-card-inner">
                                <div class="summary-card-icon">
                                    <lightning-icon icon-name="utility:date_time" size="medium" alternative-text="On Leave"></lightning-icon>
                                </div>
                                <div class="summary-card-content">
                                    <p class="summary-card-value">{leaveCount}</p>
                                    <p class="summary-card-label">On Leave</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Not Started / Absent Card -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                        <div class="summary-card summary-card-absent">
                            <div class="summary-card-inner">
                                <div class="summary-card-icon">
                                    <lightning-icon icon-name="utility:close" size="medium" alternative-text="Absent"></lightning-icon>
                                </div>
                                <div class="summary-card-content">
                                    <p class="summary-card-value">{absentCount}</p>
                                    <p class="summary-card-label">Not Started / Absent</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Auto-Closed Card -->
                    <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                        <div class="summary-card summary-card-autoclosed">
                            <div class="summary-card-inner">
                                <div class="summary-card-icon">
                                    <lightning-icon icon-name="utility:warning" size="medium" alternative-text="Auto-Closed"></lightning-icon>
                                </div>
                                <div class="summary-card-content">
                                    <p class="summary-card-value">{autoClosedCount}</p>
                                    <p class="summary-card-label">Auto-Closed</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DESKTOP DATA TABLE -->
                <div class="slds-p-horizontal_medium desktop-table">
                    <template if:true={hasAttendanceRecords}>
                        <lightning-datatable
                            key-field="id"
                            data={tableData}
                            columns={columns}
                            onrowaction={handleRowAction}
                            hide-checkbox-column
                            show-row-number-column
                            default-sort-direction="asc"
                            sorted-by={sortedBy}
                            sorted-direction={sortedDirection}
                            onsort={handleSort}
                        ></lightning-datatable>
                    </template>
                    <template if:false={hasAttendanceRecords}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:info" size="large" alternative-text="No data"></lightning-icon>
                            <p class="empty-state-text">No attendance records for selected date</p>
                            <p class="empty-state-subtext">Select a different date or check back later.</p>
                        </div>
                    </template>
                </div>

                <!-- MOBILE CARD LAYOUT -->
                <div class="slds-p-horizontal_medium mobile-cards">
                    <template if:true={hasAttendanceRecords}>
                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <template for:each={tableData} for:item="record">
                                <div key={record.id} class="slds-col slds-size_12-of-12 slds-p-bottom_small">
                                    <div class="mobile-attendance-card" onclick={handleMobileCardClick} data-record-id={record.recordId}>
                                        <!-- Card Header -->
                                        <div class="mobile-card-header">
                                            <div class="mobile-card-name">
                                                <lightning-icon icon-name="standard:user" size="small" class="slds-m-right_x-small"></lightning-icon>
                                                <span class="mobile-card-name-text">{record.salespersonName}</span>
                                            </div>
                                            <span class={record.statusBadgeClass}>{record.status}</span>
                                        </div>

                                        <!-- Card Metrics -->
                                        <div class="mobile-card-metrics">
                                            <div class="mobile-metric">
                                                <span class="mobile-metric-label">Hours</span>
                                                <span class="mobile-metric-value">{record.hoursWorked}</span>
                                            </div>
                                            <div class="mobile-metric">
                                                <span class="mobile-metric-label">Visits</span>
                                                <span class="mobile-metric-value">{record.totalVisits}</span>
                                            </div>
                                            <div class="mobile-metric">
                                                <span class="mobile-metric-label">Productive</span>
                                                <span class="mobile-metric-value">{record.productivityPercent}%</span>
                                            </div>
                                            <div class="mobile-metric">
                                                <span class="mobile-metric-label">Orders</span>
                                                <span class="mobile-metric-value">{record.totalOrders}</span>
                                            </div>
                                        </div>

                                        <!-- Card Footer -->
                                        <div class="mobile-card-footer">
                                            <span class="mobile-card-time">
                                                {record.startTime} - {record.endTime}
                                            </span>
                                            <span class="mobile-card-value">{record.orderValueFormatted}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasAttendanceRecords}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:info" size="large" alternative-text="No data"></lightning-icon>
                            <p class="empty-state-text">No attendance records for selected date</p>
                            <p class="empty-state-subtext">Select a different date or check back later.</p>
                        </div>
                    </template>
                </div>

            </template>

            <!-- ── WEEKLY SUMMARY VIEW ────────────────────────────────── -->
            <template if:true={isWeeklyView}>
                <div class="slds-p-around_medium">
                    <template if:true={hasWeeklySummary}>
                        <!-- Weekly Summary Metrics -->
                        <div class="slds-grid slds-wrap slds-gutters_small weekly-summary-container">
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.totalMembers}</p>
                                    <p class="weekly-metric-label">Total Team Members</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.avgProductivity}%</p>
                                    <p class="weekly-metric-label">Avg Productivity</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.avgVisits}</p>
                                    <p class="weekly-metric-label">Avg Daily Visits</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.avgHours}</p>
                                    <p class="weekly-metric-label">Avg Hours Worked</p>
                                </div>
                            </div>
                        </div>

                        <!-- Weekly Attendance Breakdown -->
                        <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_medium">
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-breakdown-card breakdown-present">
                                    <p class="breakdown-count">{weeklySummary.presentCount}</p>
                                    <p class="breakdown-label">Total Present Days</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-breakdown-card breakdown-leave">
                                    <p class="breakdown-count">{weeklySummary.leaveCount}</p>
                                    <p class="breakdown-label">Total Leave Days</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-breakdown-card breakdown-absent">
                                    <p class="breakdown-count">{weeklySummary.absentCount}</p>
                                    <p class="breakdown-label">Total Absent Days</p>
                                </div>
                            </div>
                        </div>

                        <!-- Weekly Orders & Revenue -->
                        <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_medium">
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.totalOrders}</p>
                                    <p class="weekly-metric-label">Total Orders</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.totalOrderValueFormatted}</p>
                                    <p class="weekly-metric-label">Total Order Value</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-bottom_small">
                                <div class="weekly-metric-card">
                                    <p class="weekly-metric-value">{weeklySummary.totalCollectionsFormatted}</p>
                                    <p class="weekly-metric-label">Total Collections</p>
                                </div>
                            </div>
                        </div>

                        <!-- Weekly Per-Member Table -->
                        <template if:true={hasWeeklySummaryRows}>
                            <div class="slds-m-top_medium desktop-table">
                                <h3 class="slds-text-heading_small slds-p-bottom_small">Per-Member Summary</h3>
                                <lightning-datatable
                                    key-field="id"
                                    data={weeklySummaryRows}
                                    columns={weeklyColumns}
                                    hide-checkbox-column
                                    show-row-number-column
                                ></lightning-datatable>
                            </div>

                            <!-- Mobile weekly cards -->
                            <div class="slds-m-top_medium mobile-cards">
                                <h3 class="slds-text-heading_small slds-p-bottom_small">Per-Member Summary</h3>
                                <div class="slds-grid slds-wrap slds-gutters_small">
                                    <template for:each={weeklySummaryRows} for:item="member">
                                        <div key={member.id} class="slds-col slds-size_12-of-12 slds-p-bottom_small">
                                            <div class="mobile-attendance-card">
                                                <div class="mobile-card-header">
                                                    <div class="mobile-card-name">
                                                        <lightning-icon icon-name="standard:user" size="small" class="slds-m-right_x-small"></lightning-icon>
                                                        <span class="mobile-card-name-text">{member.name}</span>
                                                    </div>
                                                </div>
                                                <div class="mobile-card-metrics">
                                                    <div class="mobile-metric">
                                                        <span class="mobile-metric-label">Present</span>
                                                        <span class="mobile-metric-value">{member.presentCount}</span>
                                                    </div>
                                                    <div class="mobile-metric">
                                                        <span class="mobile-metric-label">Avg Hours</span>
                                                        <span class="mobile-metric-value">{member.avgHours}</span>
                                                    </div>
                                                    <div class="mobile-metric">
                                                        <span class="mobile-metric-label">Productivity</span>
                                                        <span class="mobile-metric-value">{member.avgProductivity}%</span>
                                                    </div>
                                                    <div class="mobile-metric">
                                                        <span class="mobile-metric-label">Orders</span>
                                                        <span class="mobile-metric-value">{member.totalOrders}</span>
                                                    </div>
                                                </div>
                                                <div class="mobile-card-footer">
                                                    <span class="mobile-card-value">{member.totalOrderValueFormatted}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </template>
                    <template if:false={hasWeeklySummary}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:info" size="large" alternative-text="No data"></lightning-icon>
                            <p class="empty-state-text">No summary data for selected date range</p>
                            <p class="empty-state-subtext">Adjust the date range and try again.</p>
                        </div>
                    </template>
                </div>
            </template>

        </template>

        <!-- ── FOOTER: Last Refresh ───────────────────────────────────── -->
        <div class="slds-p-around_small slds-text-align_right footer-bar">
            <span class="last-refresh-text">
                Last refreshed: {lastRefreshDisplay}
            </span>
        </div>

    </lightning-card>
</template>
